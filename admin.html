<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MinBite · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f5;--bg2:#f2ede6;--card:#fff;--text:#2c2420;--muted:#7a6b5d;--accent:#c8956c;--accent-d:#a67350;--border:#e8e0d5;--shadow:0 4px 24px rgba(44,36,32,.08);--r:16px;--serif:'Playfair Display',Georgia,serif;--sans:'Inter',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%)}
.login-box{background:var(--card);border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(44,36,32,.12);border:1px solid var(--border)}
.login-logo{font-family:var(--serif);font-size:1.8rem;font-weight:700;text-align:center;margin-bottom:.3rem}.login-logo span{color:var(--accent)}
.login-sub{text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:2rem}
.form-group{margin-bottom:1rem}
label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.06em}
input,select,textarea{width:100%;padding:.75rem 1rem;border:1.5px solid var(--border);border-radius:12px;font-family:var(--sans);font-size:.9rem;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
.btn-primary{width:100%;background:var(--accent);color:#fff;border:none;padding:.875rem;border-radius:12px;font-family:var(--sans);font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s}
.btn-primary:hover{background:var(--accent-d)}
.btn-sm{padding:.4rem .9rem;border-radius:8px;font-family:var(--sans);font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:background .15s}
.btn-danger{background:#fde8e8;color:#b81c1c}.btn-danger:hover{background:#f5c0c0}
.btn-info{background:#e3f2fd;color:#1255a4}.btn-info:hover{background:#bee5fb}
.btn-success{background:#e8f5e9;color:#27742e}.btn-success:hover{background:#c8eacb}
.btn-warn{background:#fff3e0;color:#c65000}.btn-warn:hover{background:#ffe0b0}
.btn-default{background:var(--bg2);color:var(--text)}.btn-default:hover{background:var(--border)}
.login-err{color:#b81c1c;font-size:.82rem;text-align:center;margin-top:.75rem;min-height:1.2em}
/* DASHBOARD */
#dashboard{display:none}
.top-bar{background:rgba(250,248,245,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.bar-logo{font-family:var(--serif);font-size:1.3rem;font-weight:700}.bar-logo span{color:var(--accent)}
.bar-actions{display:flex;align-items:center;gap:.75rem}
.logout-btn{background:var(--bg2);border:1.5px solid var(--border);padding:.45rem 1rem;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;color:var(--text);transition:all .15s;font-family:var(--sans)}
.logout-btn:hover{border-color:#b81c1c;color:#b81c1c}
.refresh-badge{font-size:.75rem;color:var(--muted);background:var(--bg2);padding:.3rem .7rem;border-radius:50px;border:1px solid var(--border)}
.main{max-width:1200px;margin:0 auto;padding:2rem 1.25rem 4rem}
.section-head{font-family:var(--serif);font-size:1.4rem;margin-bottom:1.25rem;padding-bottom:.6rem;border-bottom:2px solid var(--border)}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem;margin-bottom:2.5rem}
.stat-card{background:var(--card);border-radius:var(--r);padding:1.2rem;border:1px solid var(--border);box-shadow:var(--shadow)}
.stat-val{font-family:var(--serif);font-size:2rem;font-weight:700;line-height:1;margin-bottom:.3rem}
.stat-label{font-size:.75rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.stat-revenue .stat-val{color:var(--accent)}
/* FILTER BAR */
.filter-bar{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
.filter-bar input{flex:1;min-width:180px;margin:0}
.filter-bar select{width:auto;min-width:140px;margin:0}
/* TABLE */
.table-wrap{overflow-x:auto;border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:2.5rem}
table{width:100%;border-collapse:collapse;background:var(--card);min-width:720px}
thead{background:var(--bg2)}
th{padding:.75rem 1rem;text-align:left;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:.75rem 1rem;border-bottom:1px solid var(--border);vertical-align:middle;font-size:.85rem}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(250,248,245,.6)}
.badge{display:inline-block;padding:.3rem .7rem;border-radius:50px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.b-MENUNGGU{background:#fff3e0;color:#c65000}
.b-DIPROSES{background:#e3f2fd;color:#1255a4}
.b-SIAP-DIAMBIL{background:#e8f5e9;color:#27742e}
.b-DIBATALKAN{background:#fde8e8;color:#b81c1c}
.action-row{display:flex;gap:.35rem;flex-wrap:wrap}
/* PANEL GRID */
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:2.5rem}
@media(max-width:680px){.panel-grid{grid-template-columns:1fr}}
.panel{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);padding:1.5rem}
.panel h3{font-family:var(--serif);font-size:1.1rem;margin-bottom:1.1rem}
.mini-table{width:100%;border-collapse:collapse;font-size:.83rem}
.mini-table th{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:.4rem .5rem;text-align:left;border-bottom:1px solid var(--border)}
.mini-table td{padding:.5rem .5rem;border-bottom:1px solid var(--border);vertical-align:middle}
.mini-table tr:last-child td{border-bottom:none}
.add-form{margin-top:1rem}
.add-form .form-group{margin-bottom:.75rem}
.add-form label{font-size:.72rem}
.add-form textarea{height:70px;resize:vertical;font-size:.8rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.promo-type-row{display:flex;gap:.5rem}
.promo-type-row select{width:auto;flex:0 0 120px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:400;background:rgba(44,36,32,.45);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:var(--card);border-radius:20px;padding:2rem;max-width:420px;width:100%;box-shadow:0 16px 48px rgba(44,36,32,.18);transform:scale(.95);transition:transform .25s}
.modal-overlay.open .modal-box{transform:scale(1)}
.modal-box h3{font-family:var(--serif);font-size:1.2rem;margin-bottom:1.25rem}
.modal-actions{display:flex;gap:.75rem;margin-top:1.25rem}
.modal-actions .btn-primary{flex:1;padding:.75rem}
/* TOAST */
.toast-container{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:.5rem;align-items:center;pointer-events:none}
.toast{background:var(--text);color:#fff;padding:.7rem 1.4rem;border-radius:50px;font-size:.875rem;font-weight:500;animation:tin .3s ease,tout .3s ease 2.5s forwards;box-shadow:0 4px 16px rgba(44,36,32,.2);white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateY(14px)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Min<span>Bite</span></div>
    <p class="login-sub">Panel Admin — Masuk untuk melanjutkan</p>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="Username" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Password">
    </div>
    <button class="btn-primary" onclick="doLogin()">Masuk</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="top-bar">
    <div class="bar-logo">Min<span>Bite</span> <span style="font-family:var(--sans);font-size:.8rem;font-weight:400;color:var(--muted)">· Admin</span></div>
    <div class="bar-actions">
      <span class="refresh-badge" id="refreshBadge">🔄 Auto-refresh 30s</span>
      <button class="logout-btn" onclick="doLogout()">Keluar</button>
    </div>
  </div>

  <div class="main">
    <!-- STATS -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- ORDERS -->
    <div class="section-head">📋 Daftar Pesanan</div>
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="Cari nama / ID…" oninput="renderTable()">
      <select id="filterStatus" onchange="renderTable()">
        <option value="">Semua Status</option>
        <option value="MENUNGGU">Menunggu</option>
        <option value="DIPROSES">Diproses</option>
        <option value="SIAP DIAMBIL">Siap Diambil</option>
        <option value="DIBATALKAN">Dibatalkan</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Order ID</th><th>Pelanggan</th><th>Items</th><th>Total</th>
            <th>Waktu Ambil</th><th>Status</th><th>Konfirmasi</th><th>Aksi</th>
          </tr>
        </thead>
        <tbody id="orderTableBody"></tbody>
      </table>
    </div>

    <!-- MENU & PROMO MANAGEMENT -->
    <div class="section-head">🍱 Manajemen Menu & Promo</div>
    <div class="panel-grid">
      <!-- MENU PANEL -->
      <div class="panel">
        <h3>Menu Produk</h3>
        <table class="mini-table" id="menuTable">
          <thead><tr><th>Nama</th><th>Harga</th><th>Aksi</th></tr></thead>
          <tbody></tbody>
        </table>
        <div class="add-form">
          <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.6rem">+ Tambah Produk</div>
          <div class="form-group"><label>Nama Produk</label><input type="text" id="np_name" placeholder="Nama produk"></div>
          <div class="form-row">
            <div class="form-group"><label>Harga (Rp)</label><input type="number" id="np_price" placeholder="7000"></div>
            <div style=""></div>
          </div>
          <div class="form-group"><label>Deskripsi</label><textarea id="np_desc" placeholder="Deskripsi singkat…"></textarea></div>
          <div class="form-group"><label>SVG (opsional — paste kode SVG)</label><textarea id="np_svg" placeholder="<svg …>…</svg>"></textarea></div>
          <button class="btn-primary" onclick="addProduct()" style="margin-top:.25rem">Tambah Produk</button>
        </div>
      </div>

      <!-- PROMO PANEL -->
      <div class="panel">
        <h3>Kode Promo</h3>
        <table class="mini-table" id="promoTable">
          <thead><tr><th>Kode</th><th>Tipe</th><th>Nilai</th><th>Aksi</th></tr></thead>
          <tbody></tbody>
        </table>
        <div class="add-form">
          <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.6rem">+ Tambah Promo</div>
          <div class="form-group"><label>Kode Promo</label><input type="text" id="pr_code" placeholder="Contoh: HEMAT10" style="text-transform:uppercase"></div>
          <div class="promo-type-row">
            <div class="form-group" style="flex:1"><label>Tipe</label>
              <select id="pr_type"><option value="flat">Flat (Rp)</option><option value="percent">Persentase (%)</option></select>
            </div>
            <div class="form-group" style="flex:1"><label>Nilai</label><input type="number" id="pr_val" placeholder="10000"></div>
          </div>
          <button class="btn-primary" onclick="addPromo()">Tambah Promo</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- STATUS CHANGE MODAL -->
<div class="modal-overlay" id="statusModal">
  <div class="modal-box">
    <h3>Ubah Status Pesanan</h3>
    <div class="form-group">
      <label>ID Pesanan</label>
      <input type="text" id="sm_id" readonly style="background:var(--bg2)">
    </div>
    <div class="form-group">
      <label>Status Baru</label>
      <select id="sm_status">
        <option value="MENUNGGU">Menunggu</option>
        <option value="DIPROSES">Diproses</option>
        <option value="SIAP DIAMBIL">Siap Diambil</option>
        <option value="DIBATALKAN">Dibatalkan</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-default btn-sm" style="padding:.75rem 1.25rem;border-radius:12px;font-size:.9rem" onclick="closeStatusModal()">Batal</button>
      <button class="btn-primary" onclick="saveStatus()">Simpan</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// Credentials stored as base64 — decoded at runtime only
const _u = atob('a3V6bw==');       // "kuzo"
const _p = atob('a3V6b3RhbXZhbg=='); // "kuzotamvan"

function fmtRp(n){return 'Rp\u00a0'+Number(n).toLocaleString('id-ID')}
function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.getElementById('toastContainer').appendChild(t);setTimeout(()=>t.remove(),3100)}

function doLogin(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  if(u===_u && p===_p){
    localStorage.setItem('isAdmin','1');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    initDashboard();
  } else {
    document.getElementById('loginErr').textContent='Username atau password salah.';
  }
}
document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

function doLogout(){
  localStorage.removeItem('isAdmin');
  location.reload();
}

function checkAuth(){
  if(localStorage.getItem('isAdmin')==='1'){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    initDashboard();
  }
}

function getOrders(){return JSON.parse(localStorage.getItem('orders')||'[]')}
function saveOrders(o){localStorage.setItem('orders',JSON.stringify(o))}
function getProducts(){
  const s=localStorage.getItem('products');
  if(s) return JSON.parse(s);
  return [{id:1,name:'Bola Oreo Susu',price:7000,desc:'Bola coklat Oreo lembut, taburan susu bubuk.',svg:null},{id:2,name:'Thai Tea',price:4000,desc:'Teh Thailand creamy manis, es batu segar.',svg:null}];
}
function saveProducts(p){localStorage.setItem('products',JSON.stringify(p))}
function getPromos(){return JSON.parse(localStorage.getItem('promos')||'[]')}
function savePromos(p){localStorage.setItem('promos',JSON.stringify(p))}

function badgeClass(s){
  const map={'MENUNGGU':'b-MENUNGGU','DIPROSES':'b-DIPROSES','SIAP DIAMBIL':'b-SIAP-DIAMBIL','DIBATALKAN':'b-DIBATALKAN'};
  return map[s]||'b-MENUNGGU';
}

function renderStats(){
  const orders=getOrders();
  const stats=[
    {label:'Total Pesanan',val:orders.length,cls:''},
    {label:'Menunggu',val:orders.filter(o=>o.status==='MENUNGGU').length,cls:''},
    {label:'Diproses',val:orders.filter(o=>o.status==='DIPROSES').length,cls:''},
    {label:'Siap Diambil',val:orders.filter(o=>o.status==='SIAP DIAMBIL').length,cls:''},
    {label:'Dibatalkan',val:orders.filter(o=>o.status==='DIBATALKAN').length,cls:''},
    {label:'Total Pendapatan',val:fmtRp(orders.filter(o=>o.status!=='DIBATALKAN').reduce((s,o)=>s+o.total,0)),cls:'stat-revenue'},
  ];
  document.getElementById('statsGrid').innerHTML=stats.map(s=>`
    <div class="stat-card ${s.cls}">
      <div class="stat-val">${s.val}</div>
      <div class="stat-label">${s.label}</div>
    </div>`).join('');
}

function renderTable(){
  const orders=getOrders();
  const q=document.getElementById('searchInput').value.toLowerCase();
  const fs=document.getElementById('filterStatus').value;
  const filtered=orders.filter(o=>{
    const match=!q || o.id.toLowerCase().includes(q) || o.customer.name.toLowerCase().includes(q);
    const stMatch=!fs || o.status===fs;
    return match && stMatch;
  }).sort((a,b)=>b.timestamp-a.timestamp);

  const tbody=document.getElementById('orderTableBody');
  if(!filtered.length){tbody.innerHTML=`<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--muted)">Tidak ada pesanan ditemukan</td></tr>`;return;}
  tbody.innerHTML=filtered.map(o=>{
    const items=o.items.map(i=>`${i.name}×${i.qty}`).join(', ');
    return `<tr>
      <td><code style="font-size:.75rem;background:var(--bg2);padding:.2rem .4rem;border-radius:4px">${o.id}</code></td>
      <td><div style="font-weight:500">${o.customer.name}</div><div style="font-size:.72rem;color:var(--muted)">${o.customer.kelas} ${o.customer.jurusan}</div></td>
      <td style="max-width:160px"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${items}</div></td>
      <td style="font-weight:600;color:var(--accent)">${fmtRp(o.total)}</td>
      <td>${o.customer.pickup}</td>
      <td><span class="badge ${badgeClass(o.status)}">${o.status}</span></td>
      <td>
        <a href="https://wa.me/${o.customer.wa.replace(/^0/,'62')}" target="_blank" class="btn-sm btn-success" style="text-decoration:none;display:inline-block">WA</a>
        <a href="order.html?id=${o.id}" target="_blank" class="btn-sm btn-info" style="text-decoration:none;display:inline-block;margin-left:.25rem">Web</a>
      </td>
      <td>
        <div class="action-row">
          <button class="btn-sm btn-warn" onclick="openStatusModal('${o.id}','${o.status}')">Ubah</button>
          <button class="btn-sm btn-danger" onclick="cancelOrder('${o.id}')">Batal</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function renderMenu(){
  const prods=getProducts();
  const tbody=document.querySelector('#menuTable tbody');
  tbody.innerHTML=prods.length ? prods.map(p=>`
    <tr>
      <td style="font-weight:500">${p.name}</td>
      <td>${fmtRp(p.price)}</td>
      <td><button class="btn-sm btn-danger" onclick="deleteProduct(${p.id})">Hapus</button></td>
    </tr>`).join('') : `<tr><td colspan="3" style="color:var(--muted)">Belum ada produk</td></tr>`;
}

function renderPromos(){
  const promos=getPromos();
  const tbody=document.querySelector('#promoTable tbody');
  tbody.innerHTML=promos.length ? promos.map((p,i)=>`
    <tr>
      <td><strong>${p.code}</strong></td>
      <td>${p.type==='flat'?'Flat':'%'}</td>
      <td>${p.type==='flat'?fmtRp(p.value):p.value+'%'}</td>
      <td><button class="btn-sm btn-danger" onclick="deletePromo(${i})">Hapus</button></td>
    </tr>`).join('') : `<tr><td colspan="4" style="color:var(--muted)">Belum ada promo</td></tr>`;
}

function addProduct(){
  const name=document.getElementById('np_name').value.trim();
  const price=parseInt(document.getElementById('np_price').value)||0;
  const desc=document.getElementById('np_desc').value.trim();
  const svg=document.getElementById('np_svg').value.trim();
  if(!name||!price){showToast('Nama & harga wajib diisi!');return;}
  const prods=getProducts();
  const newId=Math.max(0,...prods.map(p=>p.id))+1;
  prods.push({id:newId,name,price,desc,svg:svg||null});
  saveProducts(prods);
  ['np_name','np_price','np_desc','np_svg'].forEach(id=>document.getElementById(id).value='');
  renderMenu(); showToast('Produk ditambahkan!');
}

function deleteProduct(id){
  if(!confirm('Hapus produk ini?'))return;
  const prods=getProducts().filter(p=>p.id!==id);
  saveProducts(prods); renderMenu(); showToast('Produk dihapus.');
}

function addPromo(){
  const code=document.getElementById('pr_code').value.trim().toUpperCase();
  const type=document.getElementById('pr_type').value;
  const value=parseFloat(document.getElementById('pr_val').value)||0;
  if(!code||!value){showToast('Kode & nilai promo wajib!');return;}
  const promos=getPromos();
  if(promos.find(p=>p.code===code)){showToast('Kode promo sudah ada!');return;}
  promos.push({code,type,value});
  savePromos(promos);
  ['pr_code','pr_val'].forEach(id=>document.getElementById(id).value='');
  renderPromos(); showToast('Promo ditambahkan!');
}

function deletePromo(idx){
  const promos=getPromos();
  promos.splice(idx,1);
  savePromos(promos); renderPromos(); showToast('Promo dihapus.');
}

function cancelOrder(id){
  if(!confirm(`Batalkan pesanan ${id}?`))return;
  const orders=getOrders();
  const o=orders.find(x=>x.id===id);
  if(o) o.status='DIBATALKAN';
  saveOrders(orders); refreshAll(); showToast('Pesanan dibatalkan.');
}

function openStatusModal(id,cur){
  document.getElementById('sm_id').value=id;
  document.getElementById('sm_status').value=cur;
  document.getElementById('statusModal').classList.add('open');
}
function closeStatusModal(){document.getElementById('statusModal').classList.remove('open')}
function saveStatus(){
  const id=document.getElementById('sm_id').value;
  const ns=document.getElementById('sm_status').value;
  const orders=getOrders();
  const o=orders.find(x=>x.id===id);
  if(o) o.status=ns;
  saveOrders(orders); closeStatusModal(); refreshAll(); showToast('Status diperbarui!');
}

function refreshAll(){renderStats();renderTable();renderMenu();renderPromos()}

let countdown=30;
function tick(){
  countdown--;
  if(countdown<=0){countdown=30;refreshAll();}
  document.getElementById('refreshBadge').textContent=`🔄 Refresh ${countdown}s`;
}

function initDashboard(){
  refreshAll();
  setInterval(tick,1000);
}

checkAuth();
</script>
