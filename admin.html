<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Kantin Corner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #3b82f6; --accent: #fbbf24;
      --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
      --card: #1e293b; --card2: #0f172a;
      --text: #f1f5f9; --muted: #94a3b8;
      --success: #10b981; --warning: #f59e0b;
      --danger: #ef4444; --info: #6366f1;
      --border: #334155; --radius: 12px;
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    /* HEADER */
    .header { background: var(--card); border-bottom: 2px solid var(--border); padding: 0 20px; }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .logo { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--primary); line-height: 1.6; }
    .logo span { color: var(--accent); font-size: 7px; display: block; }
    .admin-badge { background: var(--danger); color: white; border-radius: 6px; padding: 5px 12px; font-size: 11px; font-weight: 800; letter-spacing: 1px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .live-dot { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--success); font-weight: 700; }
    .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: blink 1.5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
    /* MAIN */
    .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px 60px; }
    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
    @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 400px) { .stats-grid { grid-template-columns: 1fr 1fr; } }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; transition: transform 0.2s; }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-icon { font-size: 24px; margin-bottom: 8px; }
    .stat-num { font-family: 'Press Start 2P', monospace; font-size: 16px; margin-bottom: 4px; }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; }
    .stat-total   .stat-num { color: var(--primary); }
    .stat-menunggu .stat-num { color: var(--warning); }
    .stat-diproses .stat-num { color: var(--info); }
    .stat-siap     .stat-num { color: var(--success); }
    .stat-selesai  .stat-num { color: var(--muted); }
    /* TOOLBAR */
    .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-wrap { flex: 1; min-width: 200px; position: relative; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; }
    .search-input { width: 100%; padding: 11px 14px 11px 38px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s; }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--primary); }
    .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-tab { padding: 9px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; background: var(--card); color: var(--muted); font-family: 'Plus Jakarta Sans', sans-serif; }
    .filter-tab:hover { background: var(--bg3); }
    .filter-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    .filter-tab[data-f="MENUNGGU"].active  { background: var(--warning); border-color: var(--warning); color: #1e293b; }
    .filter-tab[data-f="DIPROSES"].active  { background: var(--info);    border-color: var(--info); }
    .filter-tab[data-f="SIAP"].active      { background: var(--success);  border-color: var(--success); }
    .filter-tab[data-f="SELESAI"].active   { background: var(--bg3);      border-color: var(--bg3);    color: var(--muted); }
    /* ORDERS LIST */
    .orders-count { font-size: 12px; color: var(--muted); margin-bottom: 12px; font-weight: 600; }
    .order-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; transition: border-color 0.2s; }
    .order-card:hover { border-color: var(--primary); }
    .order-card-top { padding: 16px 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .order-left { flex: 1; min-width: 0; }
    .order-id { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--primary); margin-bottom: 8px; word-break: break-all; line-height: 1.6; }
    .order-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .meta-chip { background: var(--bg3); border-radius: 6px; padding: 3px 8px; font-size: 11px; color: var(--muted); font-weight: 600; }
    .order-items-preview { font-size: 12px; color: var(--text); font-weight: 600; }
    .order-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .status-badge { padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 800; white-space: nowrap; }
    .b-MENUNGGU { background: #451a03; color: #fbbf24; }
    .b-DIPROSES  { background: #1e3a5f; color: #93c5fd; }
    .b-SIAP      { background: #064e3b; color: #6ee7b7; }
    .b-SELESAI   { background: #1f2937; color: #9ca3af; }
    .order-total { font-size: 16px; font-weight: 800; color: var(--accent); }
    .order-time { font-size: 10px; color: var(--muted); }
    /* CONTROL BAR */
    .order-ctrl { padding: 12px 20px; background: var(--bg2); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .status-select { flex: 1; min-width: 140px; padding: 8px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: 700; color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; cursor: pointer; outline: none; }
    .status-select:focus { border-color: var(--primary); }
    .ctrl-btn { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s; font-family: 'Plus Jakarta Sans', sans-serif; }
    .btn-detail { background: var(--bg3); color: var(--text); }
    .btn-detail:hover { background: var(--primary); border-color: var(--primary); }
    .btn-track { background: var(--bg3); color: var(--text); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
    .btn-track:hover { background: var(--success); border-color: var(--success); color: white; }
    .btn-delete { background: var(--bg3); color: var(--danger); border-color: var(--danger); }
    .btn-delete:hover { background: var(--danger); color: white; }
    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 52px; display: block; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Press Start 2P', monospace; font-size: 9px; line-height: 1.8; margin-bottom: 12px; }
    .empty-state p { font-size: 13px; }
    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 500; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .modal-head { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--primary); }
    .modal-close { background: var(--danger); color: white; border: none; border-radius: 6px; width: 30px; height: 30px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; font-family: 'Plus Jakarta Sans', sans-serif; }
    .modal-body { padding: 20px 24px; }
    .detail-section { margin-bottom: 20px; }
    .detail-section-title { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--muted); margin-bottom: 12px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .detail-item { background: var(--bg2); border-radius: 8px; padding: 12px; }
    .detail-item-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
    .detail-item-val { font-size: 13px; font-weight: 700; word-break: break-word; }
    .modal-item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: var(--bg2); border-radius: 8px; margin-bottom: 8px; }
    .modal-item-name { font-size: 13px; font-weight: 700; }
    .modal-item-qty { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .modal-item-price { font-size: 14px; font-weight: 800; color: var(--accent); }
    .modal-total { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: var(--primary); border-radius: 10px; margin-top: 12px; }
    .modal-total-label { font-family: 'Press Start 2P', monospace; font-size: 8px; }
    .modal-total-amt { font-size: 20px; font-weight: 800; }
    /* CONFIRM DIALOG */
    .confirm-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 600; align-items: center; justify-content: center; padding: 20px; }
    .confirm-dialog.open { display: flex; }
    .confirm-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 340px; width: 100%; text-align: center; }
    .confirm-box h3 { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--danger); margin-bottom: 12px; line-height: 1.8; }
    .confirm-box p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .confirm-btns { display: flex; gap: 10px; }
    .btn-cancel { flex: 1; padding: 11px; background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; font-family: 'Plus Jakarta Sans', sans-serif; }
    .btn-del-confirm { flex: 1; padding: 11px; background: var(--danger); color: white; border: 1px solid var(--danger); border-radius: 8px; cursor: pointer; font-weight: 800; font-size: 13px; font-family: 'Plus Jakarta Sans', sans-serif; }
    /* TOAST */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-weight: 700; font-size: 13px; z-index: 999; opacity: 0; transform: translateY(20px); transition: all 0.3s; box-shadow: 0 8px 24px rgba(0,0,0,0.4); pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    /* SCROLL */
    ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
    /* RESPONSIVE */
    @media (max-width: 600px) {
      .order-card-top { flex-direction: column; }
      .order-right { flex-direction: row; align-items: center; width: 100%; justify-content: space-between; }
      .detail-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">🍱 KANTIN<span>CORNER</span></div>
    <div class="header-right">
      <div class="live-dot"><span class="dot"></span>LIVE</div>
      <div class="admin-badge">ADMIN</div>
    </div>
  </div>
</header>

<main class="main">
  <!-- STATS -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card stat-total">
      <div class="stat-icon">📋</div>
      <div class="stat-num" id="stTotal">0</div>
      <div class="stat-label">Total Order</div>
    </div>
    <div class="stat-card stat-menunggu">
      <div class="stat-icon">⏳</div>
      <div class="stat-num" id="stMenunggu">0</div>
      <div class="stat-label">Menunggu</div>
    </div>
    <div class="stat-card stat-diproses">
      <div class="stat-icon">🔄</div>
      <div class="stat-num" id="stDiproses">0</div>
      <div class="stat-label">Diproses</div>
    </div>
    <div class="stat-card stat-siap">
      <div class="stat-icon">✅</div>
      <div class="stat-num" id="stSiap">0</div>
      <div class="stat-label">Siap</div>
    </div>
    <div class="stat-card stat-selesai">
      <div class="stat-icon">🎉</div>
      <div class="stat-num" id="stSelesai">0</div>
      <div class="stat-label">Selesai</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="Cari Order ID atau nama..." oninput="applyFilters()">
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" data-f="ALL" onclick="setFilter('ALL')">Semua</button>
      <button class="filter-tab" data-f="MENUNGGU" onclick="setFilter('MENUNGGU')">⏳ Menunggu</button>
      <button class="filter-tab" data-f="DIPROSES" onclick="setFilter('DIPROSES')">🔄 Diproses</button>
      <button class="filter-tab" data-f="SIAP" onclick="setFilter('SIAP')">✅ Siap</button>
      <button class="filter-tab" data-f="SELESAI" onclick="setFilter('SELESAI')">🎉 Selesai</button>
    </div>
  </div>

  <!-- ORDERS -->
  <div class="orders-count" id="ordersCount">Memuat...</div>
  <div id="ordersList"></div>
</main>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="detailModalTitle">📋 DETAIL ORDER</div>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body" id="detailModalBody"></div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-dialog" id="confirmDialog">
  <div class="confirm-box">
    <h3>⚠️ HAPUS<br>ORDER?</h3>
    <p>Order ini akan dihapus permanen dan tidak bisa dikembalikan.</p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Batal</button>
      <button class="btn-del-confirm" onclick="confirmDelete()">Hapus</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // Safe storage
  function safeGetOrders() { try { return JSON.parse(localStorage.getItem('orders') || '[]'); } catch { return []; } }
  function saveOrders(o) {
    localStorage.setItem('orders', JSON.stringify(o));
    try { bc.postMessage({ type: 'orders_updated' }); } catch {}
  }
  function fmt(n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }
  function fmtDate(iso) {
    if (!iso) return '-';
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('id-ID', {day:'2-digit',month:'short'}) + ' ' + d.toLocaleTimeString('id-ID', {hour:'2-digit',minute:'2-digit'});
    } catch { return iso; }
  }

  // BroadcastChannel
  let bc;
  try { bc = new BroadcastChannel('kantin_sync'); } catch { bc = { postMessage: ()=>{}, onmessage: null }; }
  bc.onmessage = function(e) {
    if (e && e.data && e.data.type === 'orders_updated') renderOrders();
  };
  window.addEventListener('storage', function(e) {
    if (e.key === 'orders') renderOrders();
  });

  // State
  let currentFilter = 'ALL';
  let deleteTargetId = null;

  const STATUS_BADGES = {
    MENUNGGU: 'b-MENUNGGU', DIPROSES: 'b-DIPROSES', SIAP: 'b-SIAP', SELESAI: 'b-SELESAI'
  };
  const STATUS_ICONS = { MENUNGGU:'⏳', DIPROSES:'🔄', SIAP:'✅', SELESAI:'🎉' };

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.f === f);
    });
    renderOrders();
  }

  function applyFilters() { renderOrders(); }

  function renderStats(orders) {
    document.getElementById('stTotal').textContent    = orders.length;
    document.getElementById('stMenunggu').textContent = orders.filter(o => o.status === 'MENUNGGU').length;
    document.getElementById('stDiproses').textContent = orders.filter(o => o.status === 'DIPROSES').length;
    document.getElementById('stSiap').textContent     = orders.filter(o => o.status === 'SIAP').length;
    document.getElementById('stSelesai').textContent  = orders.filter(o => o.status === 'SELESAI').length;
  }

  function renderOrders() {
    let orders = safeGetOrders();
    // Sort newest first
    orders.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));

    renderStats(orders);

    // Filter by status
    const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
    let filtered = orders;
    if (currentFilter !== 'ALL') filtered = filtered.filter(o => o.status === currentFilter);
    if (q) filtered = filtered.filter(o =>
      (o.orderId||'').toLowerCase().includes(q) ||
      (o.name||'').toLowerCase().includes(q) ||
      (o.phone||'').toLowerCase().includes(q)
    );

    const countEl = document.getElementById('ordersCount');
    const listEl  = document.getElementById('ordersList');

    countEl.textContent = `Menampilkan ${filtered.length} dari ${orders.length} order`;

    if (filtered.length === 0) {
      listEl.innerHTML = `<div class="empty-state">
        <span class="icon">${orders.length === 0 ? '📭' : '🔍'}</span>
        <h3>${orders.length === 0 ? 'BELUM ADA\nORDER' : 'TIDAK ADA\nHASIL'}</h3>
        <p>${orders.length === 0 ? 'Order dari pelanggan akan muncul di sini secara realtime.' : 'Coba ubah filter atau kata kunci pencarian.'}</p>
      </div>`;
      return;
    }

    listEl.innerHTML = filtered.map(order => {
      const items  = Array.isArray(order.items) ? order.items : [];
      const status = order.status || 'MENUNGGU';
      const preview = items.map(i => `${i.name||''} ×${i.qty||1}`).join(' · ') || '-';
      const badgeCls = STATUS_BADGES[status] || 'b-MENUNGGU';
      return `<div class="order-card" id="card-${CSS.escape(order.orderId||'')}">
        <div class="order-card-top">
          <div class="order-left">
            <div class="order-id">${escHtml(order.orderId||'')}</div>
            <div class="order-meta">
              <span class="meta-chip">👤 ${escHtml(order.name||'-')}</span>
              <span class="meta-chip">🏫 ${escHtml((order.class||'')+' '+(order.major||''))}</span>
              <span class="meta-chip">⏰ ${escHtml(order.pickupTime||'-')}</span>
              <span class="meta-chip">📱 ${escHtml(order.phone||'-')}</span>
            </div>
            <div class="order-items-preview">🛒 ${escHtml(preview)}</div>
          </div>
          <div class="order-right">
            <span class="status-badge ${badgeCls}">${STATUS_ICONS[status]||''} ${status}</span>
            <div class="order-total">${fmt(order.total||0)}</div>
            <div class="order-time">${fmtDate(order.createdAt)}</div>
          </div>
        </div>
        <div class="order-ctrl">
          <select class="status-select" onchange="updateStatus('${escAttr(order.orderId||'')}', this.value)">
            <option value="MENUNGGU" ${status==='MENUNGGU'?'selected':''}>⏳ MENUNGGU</option>
            <option value="DIPROSES" ${status==='DIPROSES'?'selected':''}>🔄 DIPROSES</option>
            <option value="SIAP"     ${status==='SIAP'    ?'selected':''}>✅ SIAP</option>
            <option value="SELESAI"  ${status==='SELESAI' ?'selected':''}>🎉 SELESAI</option>
          </select>
          <button class="ctrl-btn btn-detail" onclick="showDetail('${escAttr(order.orderId||'')}')">📋 Detail</button>
          <a class="ctrl-btn btn-track" href="return.html?id=${encodeURIComponent(order.orderId||'')}" target="_blank">🔗 Track</a>
          <button class="ctrl-btn btn-delete" onclick="askDelete('${escAttr(order.orderId||'')}')">🗑️ Hapus</button>
        </div>
      </div>`;
    }).join('');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function escAttr(s) {
    return String(s).replace(/'/g,"\\'");
  }

  function updateStatus(orderId, newStatus) {
    if (!orderId || !newStatus) return;
    const orders = safeGetOrders();
    const idx    = orders.findIndex(o => o.orderId === orderId);
    if (idx < 0) return;
    orders[idx].status = newStatus;
    saveOrders(orders);
    renderOrders();
    showToast(`✅ Status → ${newStatus}`);
  }

  // DETAIL MODAL
  function showDetail(orderId) {
    const orders = safeGetOrders();
    const order  = orders.find(o => o.orderId === orderId);
    if (!order) return;

    const items  = Array.isArray(order.items) ? order.items : [];
    const status = order.status || 'MENUNGGU';
    const badgeCls = STATUS_BADGES[status] || 'b-MENUNGGU';

    document.getElementById('detailModalTitle').textContent = '📋 ' + (order.orderId||'');
    document.getElementById('detailModalBody').innerHTML = `
      <div class="detail-section">
        <div class="detail-section-title">STATUS</div>
        <span class="status-badge ${badgeCls}" style="font-size:13px;padding:8px 16px;">${STATUS_ICONS[status]||''} ${status}</span>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">DATA PEMESAN</div>
        <div class="detail-grid">
          <div class="detail-item"><div class="detail-item-label">Nama</div><div class="detail-item-val">${escHtml(order.name||'-')}</div></div>
          <div class="detail-item"><div class="detail-item-label">Kelas</div><div class="detail-item-val">${escHtml((order.class||'')+' '+(order.major||''))}</div></div>
          <div class="detail-item"><div class="detail-item-label">No. WA</div><div class="detail-item-val">${escHtml(order.phone||'-')}</div></div>
          <div class="detail-item"><div class="detail-item-label">Waktu Ambil</div><div class="detail-item-val">${escHtml(order.pickupTime||'-')}</div></div>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">PESANAN</div>
        ${items.map(i => `<div class="modal-item-row">
          <div><div class="modal-item-name">${escHtml(i.name||'-')}</div><div class="modal-item-qty">× ${i.qty||1}</div></div>
          <div class="modal-item-price">${fmt((i.price||0)*(i.qty||1))}</div>
        </div>`).join('')}
        <div class="modal-total">
          <span class="modal-total-label">TOTAL</span>
          <span class="modal-total-amt">${fmt(order.total||0)}</span>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">WAKTU ORDER</div>
        <div class="detail-item"><div class="detail-item-val">${fmtDate(order.createdAt)}</div></div>
      </div>
      <div style="margin-top:16px">
        <label style="display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase;">UBAH STATUS</label>
        <select class="status-select" style="width:100%;padding:10px 14px;font-size:13px;" onchange="updateStatus('${escAttr(order.orderId||'')}',this.value);closeDetail()">
          <option value="MENUNGGU" ${status==='MENUNGGU'?'selected':''}>⏳ MENUNGGU</option>
          <option value="DIPROSES" ${status==='DIPROSES'?'selected':''}>🔄 DIPROSES</option>
          <option value="SIAP"     ${status==='SIAP'    ?'selected':''}>✅ SIAP</option>
          <option value="SELESAI"  ${status==='SELESAI' ?'selected':''}>🎉 SELESAI</option>
        </select>
      </div>`;
    document.getElementById('detailModal').classList.add('open');
  }

  function closeDetail() {
    document.getElementById('detailModal').classList.remove('open');
  }
  document.getElementById('detailModal').addEventListener('click', function(e) {
    if (e.target === this) closeDetail();
  });

  // DELETE
  function askDelete(orderId) {
    deleteTargetId = orderId;
    document.getElementById('confirmDialog').classList.add('open');
  }
  function closeConfirm() {
    deleteTargetId = null;
    document.getElementById('confirmDialog').classList.remove('open');
  }
  function confirmDelete() {
    if (!deleteTargetId) return;
    const orders = safeGetOrders().filter(o => o.orderId !== deleteTargetId);
    saveOrders(orders);
    closeConfirm();
    renderOrders();
    showToast('🗑️ Order dihapus');
    deleteTargetId = null;
  }

  // TOAST
  let toastTmr;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTmr);
    toastTmr = setTimeout(() => t.classList.remove('show'), 2800);
  }

  // INIT
  renderOrders();
</script>
</body>
</html>
