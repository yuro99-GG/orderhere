<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MinBite · Jajanan Sekolah</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf3e8;
      --card: #fffbf5;
      --text: #3a3226;
      --text-muted: #6b5d4f;
      --primary: #d96459;
      --primary-dark: #b23b33;
      --primary-light: #fce4e4;
      --accent: #e9c46a;
      --accent2: #6db3b5;
      --border: #c2a786;
      --shadow: 6px 6px 0 #b2936c;
      --shadow-lg: 8px 8px 0 #9c7e5c;
      --radius: 0;
      --radius-sm: 0;
      --success: #34d399;
      --danger: #ef4444;
      --pixel-font: 'Press Start 2P', cursive;
      --mono-font: 'VT323', monospace;
      --body-font: 'Plus Jakarta Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--body-font);
      background: var(--bg);
      background-image: 
        linear-gradient(rgba(255,255,255,0.4) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.4) 1px, transparent 1px);
      background-size: 32px 32px;
      background-position: center center;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      image-rendering: pixelated;
    }

    /* floating pixel decorations */
    .pixel-float {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0.2;
    }
    .pf1 { top: 10%; left: 6%; animation: floatPx 14s infinite; }
    .pf2 { bottom: 15%; right: 8%; animation: floatPx 16s infinite 2s; }
    .pf3 { top: 50%; left: 45%; animation: floatPx 12s infinite 5s; }
    .pf4 { top: 75%; left: 12%; animation: floatPx 18s infinite 1s; }
    @keyframes floatPx {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-16px) rotate(3deg); }
    }

    /* HEADER */
    header {
      background: rgba(255,251,245,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 4px solid #3a3226;
      box-shadow: 0 4px 0 rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: var(--pixel-font);
      font-size: 1.25rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: 1px;
    }
    .logo span {
      background: var(--primary);
      color: #fff;
      padding: 4px 10px;
      border: 3px solid #3a3226;
      box-shadow: 3px 3px 0 #3a3226;
      border-radius: 0;
      font-size: 0.9rem;
    }
    .cart-btn {
      font-family: var(--pixel-font);
      font-size: 0.7rem;
      background: var(--accent);
      color: #3a3226;
      border: 3px solid #3a3226;
      box-shadow: 4px 4px 0 #b2936c;
      border-radius: 0;
      padding: 12px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.1s ease;
      text-transform: uppercase;
    }
    .cart-btn:hover {
      background: #f7b32b;
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #b2936c;
    }
    .cart-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #b2936c;
    }
    .cart-count {
      background: #fff;
      border: 3px solid #3a3226;
      width: 28px; height: 28px;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: var(--primary);
      box-shadow: 2px 2px 0 #3a3226;
    }

    /* HERO */
    .hero {
      background: #f7ede0;
      border-bottom: 4px solid #3a3226;
      padding: 56px 20px 48px;
      text-align: center;
      position: relative;
      z-index: 1;
      background-image: radial-gradient(circle, #fff1db 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .hero-tag {
      font-family: var(--pixel-font);
      font-size: 0.65rem;
      background: #fff;
      border: 3px solid #3a3226;
      box-shadow: 3px 3px 0 #3a3226;
      display: inline-block;
      padding: 8px 24px;
      margin-bottom: 20px;
      letter-spacing: 1px;
      color: var(--primary);
    }
    .hero h1 {
      font-family: var(--pixel-font);
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      line-height: 1.3;
      color: #3a3226;
      text-shadow: 3px 3px 0 rgba(217,100,89,0.2);
      margin-bottom: 16px;
    }
    .hero p {
      font-family: var(--mono-font);
      font-size: 1.4rem;
      max-width: 420px;
      margin: 0 auto;
      color: #5b4a36;
    }

    /* PRODUCTS */
    .section { max-width: 1100px; margin: 0 auto; padding: 48px 20px 60px; position: relative; z-index: 1; }
    .section-title {
      font-family: var(--pixel-font);
      font-size: 0.9rem;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 6px;
      background: repeating-linear-gradient(90deg, #3a3226 0px, #3a3226 8px, transparent 8px, transparent 16px);
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 32px;
    }
    .product-card {
      background: var(--card);
      border: 4px solid #3a3226;
      box-shadow: var(--shadow);
      border-radius: 0;
      overflow: hidden;
      transition: all 0.15s;
    }
    .product-card:hover { transform: translate(-4px, -4px); box-shadow: var(--shadow-lg); }
    .product-img {
      width: 100%;
      aspect-ratio: 4/3;
      background: #fef5eb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      border-bottom: 4px solid #3a3226;
      image-rendering: auto;
    }
    .product-img svg { width: 100%; height: 100%; max-height: 180px; filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.1)); }
    .product-body { padding: 22px 20px 24px; }
    .product-name {
      font-family: var(--pixel-font);
      font-size: 0.72rem;
      margin-bottom: 8px;
      color: var(--text);
      letter-spacing: 0.5px;
    }
    .product-desc {
      font-family: var(--mono-font);
      font-size: 1.1rem;
      color: #5b4a36;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .product-price {
      font-family: var(--pixel-font);
      font-size: 0.75rem;
      background: #fff;
      border: 3px solid #3a3226;
      padding: 6px 14px;
      box-shadow: 3px 3px 0 #3a3226;
      color: var(--primary);
    }
    .qty-ctrl {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f5ebe0;
      border: 3px solid #3a3226;
      padding: 4px 6px;
      box-shadow: 2px 2px 0 #3a3226;
    }
    .qty-btn {
      width: 32px; height: 32px;
      border: 3px solid #3a3226;
      background: #fff;
      font-family: var(--pixel-font);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.1s;
      box-shadow: 2px 2px 0 #3a3226;
      color: var(--text);
    }
    .qty-btn:hover { background: var(--primary); color: #fff; }
    .qty-btn:active { transform: translate(1px, 1px); box-shadow: 0 0 0 #3a3226; }
    .qty-val { font-family: var(--pixel-font); font-size: 0.9rem; min-width: 28px; text-align: center; font-weight: bold; }
    .add-btn {
      width: 100%;
      margin-top: 16px;
      background: var(--accent);
      color: #3a3226;
      border: 3px solid #3a3226;
      box-shadow: 4px 4px 0 #3a3226;
      font-family: var(--pixel-font);
      font-size: 0.7rem;
      padding: 14px;
      cursor: pointer;
      transition: 0.1s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .add-btn:hover {
      background: #f7b32b;
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #3a3226;
    }
    .add-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #3a3226;
    }

    /* CART DRAWER */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(58,50,38,0.45);
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
      backdrop-filter: blur(2px);
    }
    .overlay.active { opacity: 1; pointer-events: all; }
    .drawer {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: min(440px, 100vw);
      background: #fffbf5;
      z-index: 201;
      box-shadow: -8px 0 0 #b2936c;
      border-left: 4px solid #3a3226;
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(.4,0,.2,1);
      display: flex;
      flex-direction: column;
    }
    .drawer.active { transform: translateX(0); }
    .drawer-header {
      padding: 22px 24px;
      border-bottom: 4px solid #3a3226;
      display: flex; align-items: center; justify-content: space-between;
      background: #fffbee;
    }
    .drawer-title { font-family: var(--pixel-font); font-size: 0.8rem; }
    .close-btn {
      font-family: var(--pixel-font);
      width: 36px; height: 36px;
      border: 3px solid #3a3226;
      background: #fff;
      box-shadow: 2px 2px 0 #3a3226;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
    }
    .close-btn:hover { background: #fae3e3; }
    .drawer-body { flex: 1; overflow-y: auto; padding: 16px 24px; }
    .empty-cart {
      text-align: center; padding: 56px 16px;
      color: var(--text-muted);
      font-family: var(--mono-font); font-size: 1.4rem;
    }
    .empty-cart-icon {
      width: 64px; height: 64px;
      background: #f5ebe0;
      border: 3px solid #3a3226;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 2rem;
    }
    .cart-item {
      display: flex; gap: 14px; padding: 16px 0;
      border-bottom: 4px dashed var(--border);
      align-items: center;
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-thumb {
      width: 60px; height: 60px;
      background: #f5ebe0;
      border: 3px solid #3a3226;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .cart-item-thumb svg { width: 42px; height: 42px; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-family: var(--pixel-font); font-size: 0.65rem; margin-bottom: 6px; }
    .cart-item-price { font-family: var(--mono-font); font-size: 1.2rem; color: var(--text-muted); }
    .cart-item-actions { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .ci-btn {
      width: 28px; height: 28px;
      border: 3px solid #3a3226;
      background: #fff;
      font-family: var(--pixel-font);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 2px 2px 0 #3a3226;
      font-size: 0.8rem;
    }
    .ci-btn:hover { background: var(--accent); }
    .ci-qty { font-family: var(--pixel-font); font-size: 0.8rem; min-width: 20px; text-align: center; }
    .ci-total { font-family: var(--pixel-font); font-size: 0.8rem; color: var(--primary); }
    .ci-del {
      background: none; border: none; cursor: pointer;
      font-size: 1.3rem; padding: 4px;
    }
    .ci-del:hover { color: var(--danger); }

    /* CHECKOUT */
    .drawer-checkout {
      border-top: 4px solid #3a3226;
      padding: 22px 24px;
      background: #fffbee;
    }
    .cart-summary {
      display: flex; justify-content: space-between;
      font-family: var(--pixel-font); font-size: 0.8rem; margin-bottom: 18px;
    }
    .checkout-toggle-btn {
      width: 100%;
      background: var(--accent2);
      border: 3px solid #3a3226;
      box-shadow: 4px 4px 0 #3a3226;
      font-family: var(--pixel-font);
      font-size: 0.7rem;
      padding: 14px;
      cursor: pointer;
      text-transform: uppercase;
      color: #fff;
      letter-spacing: 1px;
      transition: 0.1s;
    }
    .checkout-toggle-btn:hover {
      background: #5aa3a5;
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #3a3226;
    }

    /* CHECKOUT MODAL */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(58,50,38,0.55);
      z-index: 300;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-bg.active { opacity: 1; pointer-events: all; }
    .modal {
      background: #fffbf5;
      width: min(500px, 100vw);
      max-height: 90vh;
      border: 4px solid #3a3226;
      border-bottom: none;
      border-radius: 16px 16px 0 0;
      overflow-y: auto;
      padding: 28px 24px 36px;
      transform: translateY(40px);
      transition: transform 0.25s;
      box-shadow: 0 -4px 0 #3a3226;
    }
    .modal-bg.active .modal { transform: translateY(0); }
    .modal-handle {
      width: 44px; height: 5px;
      background: #c2a786;
      border-radius: 3px;
      margin: 0 auto 26px;
    }
    .modal-title {
      font-family: var(--pixel-font);
      font-size: 0.8rem;
      margin-bottom: 22px;
    }
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-family: var(--pixel-font);
      font-size: 0.55rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .form-input, .form-select {
      width: 100%;
      border: 3px solid #3a3226;
      border-radius: 0;
      padding: 14px 16px;
      font-family: var(--mono-font);
      font-size: 1.2rem;
      color: var(--text);
      background: #fffaf2;
      transition: border-color 0.2s;
      appearance: none;
    }
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .order-summary-box {
      background: #fef5eb;
      border: 3px solid #3a3226;
      padding: 18px;
      margin-bottom: 22px;
      box-shadow: 3px 3px 0 #3a3226;
    }
    .order-sum-row {
      display: flex; justify-content: space-between;
      font-family: var(--mono-font); font-size: 1.2rem;
      margin-bottom: 8px;
      color: var(--text-muted);
    }
    .order-sum-row:last-child {
      margin-bottom: 0;
      padding-top: 10px;
      border-top: 3px solid #3a3226;
      font-family: var(--pixel-font); font-size: 0.75rem;
      color: var(--text);
      font-weight: bold;
    }
    .submit-btn {
      width: 100%;
      background: var(--accent2);
      border: 3px solid #3a3226;
      box-shadow: 4px 4px 0 #3a3226;
      font-family: var(--pixel-font);
      font-size: 0.7rem;
      padding: 16px;
      cursor: pointer;
      text-transform: uppercase;
      color: #fff;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: 0.1s;
      letter-spacing: 1px;
    }
    .submit-btn:hover {
      background: #5aa3a5;
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #3a3226;
    }

    /* TOAST */
    .toast-container {
      position: fixed; top: 90px; right: 24px; z-index: 500;
      display: flex; flex-direction: column; gap: 12px;
      pointer-events: none;
    }
    .toast {
      background: #fff;
      border: 3px solid #3a3226;
      box-shadow: 4px 4px 0 #3a3226;
      padding: 14px 18px;
      font-family: var(--mono-font); font-size: 1.2rem;
      max-width: 300px;
      animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.5s forwards;
      pointer-events: all;
    }
    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--danger); }
    .toast-title { font-family: var(--pixel-font); font-size: 0.65rem; margin-bottom: 4px; }
    @keyframes slideIn {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(20px); }
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 32px 20px;
      color: var(--text-muted);
      font-family: var(--mono-font);
      font-size: 1.3rem;
      border-top: 4px solid #3a3226;
      margin-top: 40px;
      background: #fffbf5;
    }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .product-grid { grid-template-columns: 1fr; }
      .drawer { width: 100vw; }
    }
  </style>
</head>
<body>
  <!-- floating pixel art -->
  <div class="pixel-float pf1"><svg width="24" height="24" viewBox="0 0 8 8"><rect x="0" y="0" width="8" height="8" fill="#e9c46a"/><rect x="2" y="2" width="2" height="2" fill="#3a3226"/></svg></div>
  <div class="pixel-float pf2"><svg width="24" height="24" viewBox="0 0 8 8"><rect x="0" y="0" width="8" height="8" fill="#d96459"/><rect x="1" y="3" width="2" height="2" fill="#fff"/></svg></div>
  <div class="pixel-float pf3"><svg width="24" height="24" viewBox="0 0 8 8"><rect x="0" y="0" width="8" height="8" fill="#6db3b5"/><rect x="4" y="1" width="2" height="2" fill="#fff"/></svg></div>
  <div class="pixel-float pf4"><svg width="24" height="24" viewBox="0 0 8 8"><rect x="0" y="0" width="8" height="8" fill="#e9c46a"/><rect x="1" y="5" width="2" height="2" fill="#3a3226"/></svg></div>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo">MIN<span>BITE</span></div>
      <button class="cart-btn" onclick="openDrawer()">
        🛒 KERANJANG
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-tag">🍡 JAJANAN SEKOLAH</div>
    <h1>Snack Enak,<br>Harga Bersahabat</h1>
    <p>Pesan sekarang, ambil pas istirahat. Praktis, sat-set, langsung dapat.</p>
  </div>

  <!-- PRODUCTS -->
  <div class="section">
    <div class="section-title">Menu Tersedia</div>
    <div class="product-grid" id="productGrid"></div>
  </div>

  <footer>MinBite &copy; 2025 — Jajanan Sekolah Terbaik</footer>

  <!-- OVERLAY + DRAWER -->
  <div class="overlay" id="overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-title">🛒 KERANJANG BELANJA</div>
      <button class="close-btn" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-checkout" id="drawerCheckout" style="display:none">
      <div class="cart-summary">
        <span>TOTAL</span>
        <span id="cartTotal">Rp 0</span>
      </div>
      <button class="checkout-toggle-btn" onclick="openCheckout()">CHECKOUT</button>
    </div>
  </div>

  <!-- CHECKOUT MODAL -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">📋 DETAIL PEMESANAN</div>
      <div class="order-summary-box" id="orderSummaryBox"></div>
      <form onsubmit="handleCheckout(event)">
        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <input class="form-input" id="fName" placeholder="Nama kamu..." required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Kelas</label>
            <select class="form-select" id="fClass" required>
              <option value="">Pilih</option>
              <option>X</option><option>XI</option><option>XII</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Jurusan</label>
            <select class="form-select" id="fMajor" required>
              <option value="">Pilih</option>
              <option>AK</option><option>MM</option><option>MP</option><option>TKJ</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Nomor WhatsApp</label>
          <input class="form-input" id="fPhone" placeholder="08xxxxxxxxxx" pattern="08[0-9]{8,11}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Waktu Pengambilan</label>
          <select class="form-select" id="fPickup" required>
            <option value="">Pilih waktu</option>
            <option value="12.00-13.00">12.00 – 13.00</option>
            <option value="13.00-14.00">13.00 – 14.00</option>
          </select>
        </div>
        <button type="submit" class="submit-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 16.849c-.282.792-1.392 1.52-2.228 1.707-.588.132-1.355.238-3.935-.846-2.999-1.295-4.934-4.296-5.084-4.496-.149-.199-1.213-1.612-1.213-3.075 0-1.462.767-2.18 1.04-2.478.272-.298.594-.372.792-.372.198 0 .396.002.57.01.183.01.428-.069.67.51.247.594.841 2.058.916 2.207.074.148.124.322.025.52-.099.199-.149.323-.298.497-.149.174-.312.388-.446.52-.148.148-.304.309-.13.606.173.298.77 1.271 1.653 2.059 1.135 1.012 2.093 1.325 2.39 1.475.297.148.471.124.644-.075.173-.198.743-.867.94-1.164.198-.298.396-.249.67-.15.272.1 1.732.818 2.029.967.298.149.497.223.57.347.074.124.074.719-.173 1.413z"/></svg>
          KIRIM KE WHATSAPP
        </button>
      </form>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    try {
      // ---------- PRODUCT DATA (SVG ASLI TIDAK DIKURANGI) ----------
      const PRODUCTS = [
        {
          id: 'oreo',
          name: 'BOLA OREO SUSU',
          price: 7000,
          desc: 'Bola coklat Oreo lembut, taburan susu bubuk, tekstur kriuk di luar lembut di dalam.',
          svg: `<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="ball1" cx="40%" cy="35%" r="60%">
                <stop offset="0%" stop-color="#4a3728"/>
                <stop offset="100%" stop-color="#1a0f08"/>
              </radialGradient>
              <radialGradient id="ball2" cx="35%" cy="30%" r="60%">
                <stop offset="0%" stop-color="#3d2d1f"/>
                <stop offset="100%" stop-color="#150a04"/>
              </radialGradient>
              <radialGradient id="ball3" cx="45%" cy="35%" r="60%">
                <stop offset="0%" stop-color="#52402f"/>
                <stop offset="100%" stop-color="#1e1008"/>
              </radialGradient>
              <filter id="softShadow">
                <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1a0f08" flood-opacity="0.25"/>
              </filter>
            </defs>
            <!-- Plate -->
            <ellipse cx="100" cy="138" rx="72" ry="12" fill="#e2e8f0" opacity=".6"/>
            <!-- Balls back row -->
            <circle cx="62" cy="100" r="28" fill="url(#ball2)" filter="url(#softShadow)"/>
            <circle cx="138" cy="100" r="28" fill="url(#ball2)" filter="url(#softShadow)"/>
            <!-- Balls front row -->
            <circle cx="100" cy="108" r="32" fill="url(#ball1)" filter="url(#softShadow)"/>
            <circle cx="58" cy="98" r="2" fill="#fff" opacity=".2"/>
            <circle cx="130" cy="96" r="2" fill="#fff" opacity=".2"/>
            <circle cx="94" cy="100" r="3" fill="#fff" opacity=".18"/>
            <!-- Milk powder sprinkles -->
            <g fill="#f8fafc" opacity=".7">
              <ellipse cx="80" cy="82" rx="5" ry="2" transform="rotate(-20 80 82)"/>
              <ellipse cx="118" cy="78" rx="4" ry="1.5" transform="rotate(15 118 78)"/>
              <ellipse cx="100" cy="85" rx="4" ry="1.5" transform="rotate(-5 100 85)"/>
              <ellipse cx="68" cy="90" rx="3.5" ry="1.5" transform="rotate(30 68 90)"/>
              <ellipse cx="134" cy="86" rx="4" ry="1.5" transform="rotate(-25 134 86)"/>
              <ellipse cx="88" cy="78" rx="3" ry="1" transform="rotate(10 88 78)"/>
              <ellipse cx="112" cy="90" rx="3.5" ry="1.5" transform="rotate(-15 112 90)"/>
              <ellipse cx="56" cy="85" rx="3" ry="1" transform="rotate(40 56 85)"/>
              <ellipse cx="144" cy="92" rx="3" ry="1" transform="rotate(-30 144 92)"/>
            </g>
            <!-- shine -->
            <ellipse cx="90" cy="96" rx="8" ry="5" fill="#fff" opacity=".08" transform="rotate(-20 90 96)"/>
            <ellipse cx="125" cy="92" rx="6" ry="4" fill="#fff" opacity=".07" transform="rotate(-20 125 92)"/>
          </svg>`
        },
        {
          id: 'thai-tea',
          name: 'THAI TEA',
          price: 4000,
          desc: 'Teh Thailand creamy manis, es batu segar, cocok buat melepas dahaga.',
          svg: `<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="teaGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#f97316"/>
                <stop offset="100%" stop-color="#c2410c"/>
              </linearGradient>
              <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
                <stop offset="20%" stop-color="rgba(255,255,255,0.05)"/>
                <stop offset="80%" stop-color="rgba(255,255,255,0.05)"/>
                <stop offset="100%" stop-color="rgba(255,255,255,0.2)"/>
              </linearGradient>
              <filter id="iceShadow">
                <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
              </filter>
            </defs>
            <!-- glass shadow -->
            <ellipse cx="100" cy="140" rx="45" ry="8" fill="#cbd5e1" opacity=".4"/>
            <!-- outer glass -->
            <path d="M55 50 L55 125 Q55 140 100 142 Q145 140 145 125 L145 50 Z" fill="rgba(255,255,255,0.25)" stroke="#cbd5e1" stroke-width="2"/>
            <!-- tea liquid -->
            <path d="M57 52 L57 123 Q57 137 100 139 Q143 137 143 123 L143 52 Z" fill="url(#teaGrad)" opacity="0.9"/>
            <!-- glass shine -->
            <path d="M65 60 L65 130" stroke="url(#glass)" stroke-width="8" stroke-linecap="round" fill="none"/>
            <!-- ice cubes -->
            <rect x="70" y="78" width="18" height="18" rx="3" fill="#fff" fill-opacity="0.75" filter="url(#iceShadow)" stroke="#e2e8f0" stroke-width="1"/>
            <rect x="95" y="68" width="22" height="22" rx="4" fill="#fff" fill-opacity="0.8" filter="url(#iceShadow)" stroke="#e2e8f0" stroke-width="1"/>
            <rect x="115" y="82" width="16" height="16" rx="2" fill="#fff" fill-opacity="0.7" filter="url(#iceShadow)" stroke="#e2e8f0" stroke-width="1"/>
            <!-- straw -->
            <line x1="128" y1="40" x2="124" y2="110" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
            <line x1="130" y1="40" x2="126" y2="110" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
            <path d="M128 40 Q133 30 138 35" stroke="#ef4444" stroke-width="4" fill="none" stroke-linecap="round"/>
            <!-- tea tag string (optional) -->
            <path d="M72 50 Q70 35 62 30" stroke="#b45309" stroke-width="1.2" fill="none"/>
            <rect x="55" y="24" width="14" height="10" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="0.8"/>
          </svg>`
        }
      ];

      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let qty = { oreo: 1, 'thai-tea': 1 };

      function fmt(n) { return 'Rp ' + n.toLocaleString('id-ID'); }

      function renderProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = PRODUCTS.map(p => `
          <div class="product-card">
            <div class="product-img">${p.svg}</div>
            <div class="product-body">
              <div class="product-name">${p.name}</div>
              <div class="product-desc">${p.desc}</div>
              <div class="product-footer">
                <div class="product-price">${fmt(p.price)}</div>
                <div class="qty-ctrl">
                  <button class="qty-btn" onclick="changeQty('${p.id}', -1)">&#x2212;</button>
                  <span class="qty-val" id="qty-${p.id}">${qty[p.id]}</span>
                  <button class="qty-btn" onclick="changeQty('${p.id}', 1)">&#x2B;</button>
                </div>
              </div>
              <button class="add-btn" onclick="addToCart('${p.id}')">✨ TAMBAH KE KERANJANG</button>
            </div>
          </div>
        `).join('');
      }

      function changeQty(id, delta) {
        qty[id] = Math.max(1, (qty[id] || 1) + delta);
        const el = document.getElementById('qty-' + id);
        if (el) el.textContent = qty[id];
      }

      function addToCart(id) {
        try {
          const p = PRODUCTS.find(x => x.id === id);
          const q = qty[id] || 1;
          const existing = cart.find(x => x.id === id);
          if (existing) existing.qty += q;
          else cart.push({ id: p.id, name: p.name, price: p.price, qty: q, svg: p.svg });
          saveCart();
          updateCartUI();
          showToast('DITAMBAHKAN!', `${p.name} x${q} masuk keranjang.`, 'success');
        } catch(e) { showToast('ERROR', 'Gagal menambah item.', 'error'); }
      }

      function removeFromCart(id) {
        cart = cart.filter(x => x.id !== id);
        saveCart();
        updateCartUI();
        renderDrawer();
      }

      function updateCartQty(id, delta) {
        const item = cart.find(x => x.id === id);
        if (!item) return;
        item.qty += delta;
        if (item.qty <= 0) { removeFromCart(id); return; }
        saveCart();
        updateCartUI();
        renderDrawer();
      }

      function saveCart() {
        localStorage.setItem("cart", JSON.stringify(cart));
      }

      function cartTotal() {
        return cart.reduce((s, i) => s + i.price * i.qty, 0);
      }

      function updateCartUI() {
        const total = cart.reduce((s, i) => s + i.qty, 0);
        document.getElementById('cartCount').textContent = total;
        document.getElementById('cartTotal').textContent = fmt(cartTotal());
        const co = document.getElementById('drawerCheckout');
        if (co) co.style.display = cart.length ? 'block' : 'none';
      }

      function renderDrawer() {
        const body = document.getElementById('drawerBody');
        if (!cart.length) {
          body.innerHTML = `<div class="empty-cart">
            <div class="empty-cart-icon">🛍️</div>
            <div style="font-family:var(--pixel-font); font-size:0.7rem; margin-bottom:6px;">KERANJANG KOSONG</div>
            <div style="font-size:1.2rem; color:var(--text-muted);">Tambahkan produk dari menu di atas.</div>
          </div>`;
          return;
        }
        body.innerHTML = cart.map(item => `
          <div class="cart-item">
            <div class="cart-item-thumb">${item.svg}</div>
            <div class="cart-item-info">
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-price">${fmt(item.price)} / pcs</div>
              <div class="cart-item-actions">
                <button class="ci-btn" onclick="updateCartQty('${item.id}', -1)">&#x2212;</button>
                <span class="ci-qty">${item.qty}</span>
                <button class="ci-btn" onclick="updateCartQty('${item.id}', 1)">&#x2B;</button>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
              <div class="ci-total">${fmt(item.price * item.qty)}</div>
              <button class="ci-del" onclick="removeFromCart('${item.id}')" title="Hapus">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
              </button>
            </div>
          </div>
        `).join('');
      }

      function openDrawer() {
        renderDrawer();
        updateCartUI();
        document.getElementById('overlay').classList.add('active');
        document.getElementById('drawer').classList.add('active');
      }

      function closeDrawer() {
        document.getElementById('overlay').classList.remove('active');
        document.getElementById('drawer').classList.remove('active');
      }

      function openCheckout() {
        if (!cart.length) { showToast('PERHATIAN', 'Keranjang masih kosong!', 'error'); return; }
        const box = document.getElementById('orderSummaryBox');
        box.innerHTML = cart.map(i => `
          <div class="order-sum-row"><span>${i.name} x${i.qty}</span><span>${fmt(i.price * i.qty)}</span></div>
        `).join('') + `<div class="order-sum-row"><span>TOTAL</span><span>${fmt(cartTotal())}</span></div>`;
        document.getElementById('modalBg').classList.add('active');
      }

      document.getElementById('modalBg').addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('active');
      });

      function generateOrderId() {
        return 'ORD' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substr(2,3).toUpperCase();
      }

      function handleCheckout(e) {
        e.preventDefault();
        try {
          const name = document.getElementById('fName').value.trim();
          const cls = document.getElementById('fClass').value;
          const major = document.getElementById('fMajor').value;
          const phone = document.getElementById('fPhone').value.trim();
          const pickup = document.getElementById('fPickup').value;
          if (!name || !cls || !major || !phone || !pickup) {
            showToast('LENGKAPI DATA', 'Semua kolom wajib diisi.', 'error'); return;
          }
          if (!phone.startsWith('08') || phone.length < 10) {
            showToast('NOMOR SALAH', 'Nomor WA harus diawali 08.', 'error'); return;
          }

          const orderId = generateOrderId();
          const order = {
            orderId, name, class: cls, major, phone, pickup,
            items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
            total: cartTotal(),
            status: 'MENUNGGU',
            waConfirmed: false,
            webConfirmed: false,
            createdAt: new Date().toISOString()
          };

          let orders = JSON.parse(localStorage.getItem("orders")) || [];
          orders.push(order);
          localStorage.setItem("orders", JSON.stringify(orders));
          localStorage.setItem("lastOrderId", orderId);
          localStorage.setItem("waConfirmed_" + orderId, "false");
          localStorage.setItem("webConfirmed_" + orderId, "false");

          // Build WA message with return link
          const returnUrl = window.location.origin + '/return.html?id=' + orderId;
          const itemLines = order.items.map(i => `- ${i.name} x${i.qty} = ${fmt(i.price * i.qty)}`).join('\n');
          const message = `Halo Atmin, saya mau pesan:\n\n${itemLines}\n\nTotal: ${fmt(order.total)}\nNama: ${name} (${cls} ${major})\nAmbil: ${pickup}\nOrder ID: ${orderId}\n\nKembali ke website untuk ambil QR Pesanan: ${returnUrl}`;

          // Clear cart
          cart = [];
          saveCart();
          updateCartUI();

          localStorage.setItem("waConfirmed_" + orderId, "true");
          let ords = JSON.parse(localStorage.getItem("orders")) || [];
          const idx = ords.findIndex(o => o.orderId === orderId);
          if (idx !== -1) { ords[idx].waConfirmed = true; localStorage.setItem("orders", JSON.stringify(ords)); }

          document.getElementById('modalBg').classList.remove('active');
          closeDrawer();

          showToast('PESANAN DIBUAT!', 'Mengarahkan ke WhatsApp...', 'success');

          setTimeout(() => {
            window.open(`https://wa.me/6285694458024?text=${encodeURIComponent(message)}`, '_blank');
            setTimeout(() => { window.location.href = 'return.html?id=' + orderId; }, 800);
          }, 1000);

        } catch(err) { showToast('ERROR', 'Terjadi kesalahan. Coba lagi.', 'error'); }
      }

      function showToast(title, msg, type = '') {
        const container = document.getElementById('toastContainer');
        const t = document.createElement('div');
        t.className = 'toast ' + type;
        t.innerHTML = `<div class="toast-title">${title}</div><div>${msg}</div>`;
        container.appendChild(t);
        setTimeout(() => t.remove(), 3000);
      }

      // Expose functions to global scope
      window.changeQty = changeQty;
      window.addToCart = addToCart;
      window.removeFromCart = removeFromCart;
      window.updateCartQty = updateCartQty;
      window.openDrawer = openDrawer;
      window.closeDrawer = closeDrawer;
      window.openCheckout = openCheckout;
      window.handleCheckout = handleCheckout;

      renderProducts();
      updateCartUI();
    } catch(e) { console.error(e); }
  </script>
</body>
  </html>
