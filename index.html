<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MinBite • Jajanan Sekolah</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --primary-light: #eff6ff;
      --border: #e2e8f0;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.10);
      --radius: 16px;
      --radius-sm: 10px;
      --success: #10b981;
      --danger: #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--primary); }
    .cart-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 10px 20px;
      font-family: inherit;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all .2s;
    }
    .cart-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .cart-count {
      background: #fff;
      color: var(--primary);
      border-radius: 50%;
      width: 20px; height: 20px;
      font-size: .75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, #eff6ff 0%, #f0fdf4 100%);
      border-bottom: 1px solid var(--border);
      padding: 48px 20px 40px;
      text-align: center;
    }
    .hero-tag {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary);
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 50px;
      margin-bottom: 16px;
    }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      line-height: 1.2;
      margin-bottom: 12px;
      color: var(--text);
    }
    .hero p {
      color: var(--text-muted);
      font-size: .95rem;
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* PRODUCTS */
    .section { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }
    .product-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
    }
    .product-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
    .product-img {
      width: 100%;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      padding: 24px;
    }
    .product-img svg { width: 100%; height: 100%; max-height: 180px; }
    .product-body { padding: 20px; }
    .product-name {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .product-desc {
      font-size: .8rem;
      color: var(--text-muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .product-price {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }
    .qty-ctrl {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .qty-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--bg);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      color: var(--text);
    }
    .qty-btn:hover { border-color: var(--primary); color: var(--primary); }
    .qty-val { font-weight: 700; font-size: .95rem; min-width: 20px; text-align: center; }
    .add-btn {
      width: 100%;
      margin-top: 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px;
      font-family: inherit;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .add-btn:hover { background: var(--primary-dark); }
    .add-btn:active { transform: scale(.98); }

    /* CART DRAWER */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.4);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
      backdrop-filter: blur(2px);
    }
    .overlay.active { opacity: 1; pointer-events: all; }
    .drawer {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: min(420px, 100vw);
      background: var(--card);
      z-index: 201;
      box-shadow: -8px 0 40px rgba(0,0,0,.12);
      transform: translateX(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      display: flex;
      flex-direction: column;
    }
    .drawer.active { transform: translateX(0); }
    .drawer-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .drawer-title { font-size: 1.05rem; font-weight: 700; }
    .close-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: var(--text-muted);
      transition: all .15s;
    }
    .close-btn:hover { border-color: var(--danger); color: var(--danger); }
    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }
    .empty-cart {
      text-align: center;
      padding: 48px 16px;
      color: var(--text-muted);
    }
    .empty-cart-icon {
      width: 64px; height: 64px;
      background: var(--bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 1.8rem;
    }
    .cart-item {
      display: flex;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-thumb {
      width: 56px; height: 56px;
      background: #f1f5f9;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cart-item-thumb svg { width: 40px; height: 40px; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-weight: 600; font-size: .9rem; margin-bottom: 4px; }
    .cart-item-price { font-size: .8rem; color: var(--text-muted); }
    .cart-item-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .ci-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      font-weight: 700;
      transition: all .15s;
      color: var(--text);
    }
    .ci-btn:hover { border-color: var(--primary); color: var(--primary); }
    .ci-qty { font-weight: 700; font-size: .85rem; min-width: 16px; text-align: center; }
    .ci-total { font-weight: 700; font-size: .9rem; color: var(--primary); }
    .ci-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: .9rem;
      padding: 4px;
      border-radius: 6px;
      transition: color .15s;
    }
    .ci-del:hover { color: var(--danger); }

    /* CHECKOUT */
    .drawer-checkout {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      flex-shrink: 0;
      background: var(--card);
    }
    .cart-summary {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-weight: 700;
      font-size: 1rem;
    }
    .checkout-toggle-btn {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 13px;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .checkout-toggle-btn:hover { background: var(--primary-dark); }

    /* CHECKOUT FORM MODAL */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.5);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
      backdrop-filter: blur(2px);
    }
    .modal-bg.active { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card);
      width: min(500px, 100vw);
      max-height: 90vh;
      border-radius: 24px 24px 0 0;
      overflow-y: auto;
      padding: 28px 24px 32px;
      transform: translateY(40px);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
    }
    .modal-bg.active .modal { transform: translateY(0); }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 24px;
    }
    .modal-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 6px;
    }
    .form-input, .form-select {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-family: inherit;
      font-size: .9rem;
      color: var(--text);
      background: var(--bg);
      transition: border-color .15s;
      appearance: none;
    }
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--card);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .order-summary-box {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 14px;
      margin-bottom: 20px;
    }
    .order-sum-row {
      display: flex;
      justify-content: space-between;
      font-size: .85rem;
      margin-bottom: 6px;
      color: var(--text-muted);
    }
    .order-sum-row:last-child {
      margin-bottom: 0;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      font-weight: 700;
      color: var(--text);
      font-size: .95rem;
    }
    .submit-btn {
      width: 100%;
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .2s;
    }
    .submit-btn:hover { background: #1db954; }

    /* POPUP TOAST */
    .toast-container {
      position: fixed;
      top: 80px;
      right: 20px;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      background: var(--card);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      box-shadow: var(--shadow-lg);
      border-left: 3px solid var(--primary);
      font-size: .875rem;
      font-weight: 500;
      max-width: 300px;
      animation: slideIn .3s ease, fadeOut .3s ease 2.5s forwards;
      pointer-events: all;
    }
    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--danger); }
    .toast-title { font-weight: 700; margin-bottom: 2px; font-size: .9rem; }
    @keyframes slideIn {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(20px); }
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 32px 20px;
      color: var(--text-muted);
      font-size: .8rem;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .product-grid { grid-template-columns: 1fr; }
      .drawer { width: 100vw; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">Min<span>Bite</span></div>
    <button class="cart-btn" onclick="openDrawer()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Keranjang
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<div class="hero">
  <div class="hero-tag">Jajanan Sekolah</div>
  <h1>Snack Enak,<br><em>Harga Bersahabat</em></h1>
  <p>Pesan sekarang, ambil pas istirahat. Praktis, sat-set, langsung dapat.</p>
</div>

<div class="section">
  <div class="section-title">Menu Tersedia</div>
  <div class="product-grid" id="productGrid"></div>
</div>

<footer>MinBite &copy; 2025 &mdash; Jajanan Sekolah Terbaik</footer>

<!-- OVERLAY + DRAWER -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title">Keranjang Belanja</div>
    <button class="close-btn" onclick="closeDrawer()">&#x2715;</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-checkout" id="drawerCheckout" style="display:none">
    <div class="cart-summary">
      <span>Total</span>
      <span id="cartTotal">Rp 0</span>
    </div>
    <button class="checkout-toggle-btn" onclick="openCheckout()">Lanjut Checkout</button>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Detail Pemesanan</div>
    <div class="order-summary-box" id="orderSummaryBox"></div>
    <form onsubmit="handleCheckout(event)">

          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Jurusan</label>
          <select class="form-select" id="fMajor" required>
            <option value="">Pilih</option>
            <option>AK</option><option>MM</option><option>MP</option><option>TKJ</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Nomor WhatsApp</label>
        <input class="form-input" id="fPhone" placeholder="08xxxxxxxxxx" pattern="08[0-9]{8,11}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Waktu Pengambilan</label>
        <select class="form-select" id="fPickup" required>
          <option value="">Pilih waktu</option>
          <option value="12.00-13.00">12.00 – 13.00</option>
          <option value="13.00-14.00">13.00 – 14.00</option>
        </select>
      </div>
      <button type="submit" class="submit-btn">

        Kirim ke WhatsApp
      </button>
    </form>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  (function() {
    // ---------- PRODUCT DATA ----------
    const PRODUCTS = [
      {
        id: 'oreo',
        name: 'Bola Oreo Susu',
        price: 7000,   // updated price

          <g fill="#f8fafc" opacity=".7">
            <ellipse cx="80" cy="82" rx="5" ry="2" transform="rotate(-20 80 82)"/>
            <ellipse cx="118" cy="78" rx="4" ry="1.5" transform="rotate(15 118 78)"/>
            <ellipse cx="100" cy="85" rx="4" ry="1.5" transform="rotate(-5 100 85)"/>
            <ellipse cx="68" cy="90" rx="3.5" ry="1.5" transform="rotate(30 68 90)"/>
            <ellipse cx="134" cy="86" rx="4" ry="1.5" transform="rotate(-25 134 86)"/>
            <ellipse cx="88" cy="78" rx="3" ry="1" transform="rotate(10 88 78)"/>
            <ellipse cx="112" cy="90" rx="3.5" ry="1.5" transform="rotate(-15 112 90)"/>
            <ellipse cx="56" cy="85" rx="3" ry="1" transform="rotate(40 56 85)"/>
            <ellipse cx="144" cy="92" rx="3" ry="1" transform="rotate(-30 144 92)"/>
          </g>
          <ellipse cx="90" cy="96" rx="8" ry="5" fill="#fff" opacity=".08" transform="rotate(-20 90 96)"/>
          <ellipse cx="125" cy="92" rx="6" ry="4" fill="#fff" opacity=".07" transform="rotate(-20 125 92)"/>
        </svg>`
      },
      {
        id: 'thai-tea',
        name: 'Thai Tea',
        price: 4000,   // new product & price
        desc: 'Teh Thailand creamy manis, es batu segar, cocok buat melepas dahaga.',
        svg: `<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="teaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#f97316"/>
              <stop offset="100%" stop-color="#c2410c"/>
            </linearGradient>
            <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
              <stop offset="20%" stop-color="rgba(255,255,255,0.05)"/>
              <stop offset="80%" stop-color="rgba(255,255,255,0.05)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0.2)"/>
            </linearGradient>
            <filter id="iceShadow">
              <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
            </filter>
          </defs>
          <!-- glass shadow -->
          <ellipse cx="100" cy="140" rx="45" ry="8" fill="#cbd5e1" opacity=".4"/>
          <!-- outer glass -->
          <path d="M55 50 L55 125 Q55 140 100 142 Q145 140 145 125 L145 50 Z" fill="rgba(255,255,255,0.25)" stroke="#cbd5e1" stroke-width="2"/>
          <!-- tea liquid -->
          <path d="M57 52 L57 123 Q57 137 100 139 Q143 137 143 123 L143 52 Z" fill="url(#teaGrad)" opacity="0.9"/>
          <!-- glass shine -->
          <path d="M65 60 L65 130" stroke="url(#glass)" stroke-width="8" stroke-linecap="round" fill="none"/>
          <!-- ice cubes -->
          <rect x="70" y="78" width="18" height="18" rx="3" fill="#fff" fill-opacity="0.75" filter="url(#iceShadow)" stroke="#e2e8f0" stroke-width="1"/>
          <rect x="95" y="68" width="22" height="22" rx="4" fill="#fff" fill-opacity="0.8" filter="url(#iceShadow)" stroke="#e2e8f0" stroke-width="1"/>
          <rect x="115" y="82" width="16" height="16" rx="2" fill="#fff" fill-opacity="0.7" filter="url(#iceShadow)" stroke="#e2e8f0" stroke-width="1"/>
          <!-- straw -->
          <line x1="128" y1="40" x2="124" y2="110" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
          <line x1="130" y1="40" x2="126" y2="110" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
          <path d="M128 40 Q133 30 138 35" stroke="#ef4444" stroke-width="4" fill="none" stroke-linecap="round"/>
          <!-- tea tag string (optional) -->
          <path d="M72 50 Q70 35 62 30" stroke="#b45309" stroke-width="1.2" fill="none"/>
          <rect x="55" y="24" width="14" height="10" rx="2" fill="#fef3c7" stroke="#d97706" stroke-width="0.8"/>
        </svg>`
      }
    ];

    // ---------- STATE ----------
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    // initial quantity per product (matching IDs)
    let qty = { oreo: 1, 'thai-tea': 1 };

    // ---------- HELPERS ----------
    function fmt(n) { return 'Rp ' + n.toLocaleString('id-ID'); }

    function saveCart() {
      localStorage.setItem("cart", JSON.stringify(cart));
    }

    function cartTotal() {
      return cart.reduce((s, i) => s + i.price * i.qty, 0);
    }

    function updateCartUI() {
      const totalItems = cart.reduce((s, i) => s + i.qty, 0);
      document.getElementById('cartCount').textContent = totalItems;
      document.getElementById('cartTotal').textContent = fmt(cartTotal());
      const checkoutBlock = document.getElementById('drawerCheckout');
      if (checkoutBlock) checkoutBlock.style.display = cart.length ? 'block' : 'none';
    }

    // ---------- RENDER PRODUCTS ----------
    function renderProducts() {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = PRODUCTS.map(p => `
        <div class="product-card">
          <div class="product-img">${p.svg}</div>
          <div class="product-body">
            <div class="product-name">${p.name}</div>
            <div class="product-desc">${p.desc}</div>
            <div class="product-footer">
              <div class="product-price">${fmt(p.price)}</div>
              <div class="qty-ctrl">
                <button class="qty-btn" onclick="window.changeQty('${p.id}', -1)">&#x2212;</button>
                <span class="qty-val" id="qty-${p.id}">${qty[p.id]}</span>
                <button class="qty-btn" onclick="window.changeQty('${p.id}', 1)">&#x2B;</button>
              </div>
            </div>
            <button class="add-btn" onclick="window.addToCart('${p.id}')">Tambah ke Keranjang</button>
          </div>
        </div>
      `).join('');
    }

    // ---------- QUANTITY & CART ACTIONS ----------
    window.changeQty = function(id, delta) {
      qty[id] = Math.max(1, (qty[id] || 1) + delta);
      const el = document.getElementById('qty-' + id);
      if (el) el.textContent = qty[id];
    };

    window.addToCart = function(id) {
      try {
        const p = PRODUCTS.find(x => x.id === id);
        const q = qty[id] || 1;
        const existing = cart.find(x => x.id === id);
        if (existing) {
          existing.qty += q;
        } else {
          cart.push({ id: p.id, name: p.name, price: p.price, qty: q, svg: p.svg });
        }
        saveCart();
        updateCartUI();
        showToast('Ditambahkan!', `${p.name} x${q} masuk keranjang.`, 'success');
      } catch (e) {
        showToast('Error', 'Gagal menambah item.', 'error');
      }
    };

    window.removeFromCart = function(id) {
      cart = cart.filter(x => x.id !== id);
      saveCart();
      updateCartUI();
      renderDrawer();
    };

    window.updateCartQty = function(id, delta) {
      const item = cart.find(x => x.id === id);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) {
        window.removeFromCart(id);
        return;
      }
      saveCart();
      updateCartUI();
      renderDrawer();
    };

    // ---------- DRAWER ----------
    function renderDrawer() {
      const body = document.getElementById('drawerBody');
      if (!cart.length) {
        body.innerHTML = `<div class="empty-cart">
          <div class="empty-cart-icon">
            <svg width="28" height="28" fill="none" stroke="#94a3b8" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          </div>
          <div style="font-weight:600;margin-bottom:6px;">Keranjang Kosong</div>
          <div style="font-size:.85rem;color:var(--text-muted);">Tambahkan produk dari menu di atas.</div>
        </div>`;
        return;
      }
      body.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div class="cart-item-thumb">${item.svg}</div>
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">${fmt(item.price)} / pcs</div>
            <div class="cart-item-actions">
              <button class="ci-btn" onclick="window.updateCartQty('${item.id}', -1)">&#x2212;</button>
              <span class="ci-qty">${item.qty}</span>
              <button class="ci-btn" onclick="window.updateCartQty('${item.id}', 1)">&#x2B;</button>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
            <div class="ci-total">${fmt(item.price * item.qty)}</div>
            <button class="ci-del" onclick="window.removeFromCart('${item.id}')" title="Hapus">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
            </button>
          </div>
        </div>
      `).join('');
    }

    window.openDrawer = function() {
      renderDrawer();
      updateCartUI();
      document.getElementById('overlay').classList.add('active');
      document.getElementById('drawer').classList.add('active');
    };

    window.closeDrawer = function() {
      document.getElementById('overlay').classList.remove('active');
      document.getElementById('drawer').classList.remove('active');
    };

    // ---------- CHECKOUT & WHATSAPP ----------
    window.openCheckout = function() {
      if (!cart.length) {
        showToast('Perhatian', 'Keranjang masih kosong!', 'error');
        return;
      }
      const box = document.getElementById('orderSummaryBox');
      box.innerHTML = cart.map(i => `
        <div class="order-sum-row"><span>${i.name} x${i.qty}</span><span>${fmt(i.price * i.qty)}</span></div>
      `).join('') + `<div class="order-sum-row"><span>Total</span><span>${fmt(cartTotal())}</span></div>`;
      document.getElementById('modalBg').classList.add('active');
    };

    document.getElementById('modalBg').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('active');
    });

    function generateOrderId() {
      return 'ORD' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substr(2,3).toUpperCase();
    }

    window.handleCheckout = function(e) {
      e.preventDefault();
      try {
        const name = document.getElementById('fName').value.trim();
        const cls = document.getElementById('fClass').value;
        const major = document.getElementById('fMajor').value;
        const phone = document.getElementById('fPhone').value.trim();
        const pickup = document.getElementById('fPickup').value;
        if (!name || !cls || !major || !phone || !pickup) {
          showToast('Lengkapi Data', 'Semua kolom wajib diisi.', 'error');
          return;
        }
        if (!phone.startsWith('08') || phone.length < 10) {
          showToast('Nomor Salah', 'Nomor WA harus diawali 08.', 'error');
          return;
        }

        const orderId = generateOrderId();
        const order = {
          orderId, name, class: cls, major, phone, pickup,
          items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
          total: cartTotal(),
          status: 'MENUNGGU',
          waConfirmed: false,
          webConfirmed: false,
          createdAt: new Date().toISOString()
        };

        // Save order to localStorage
        let orders = JSON.parse(localStorage.getItem("orders")) || [];
        orders.push(order);
        localStorage.setItem("orders", JSON.stringify(orders));
        localStorage.setItem("lastOrderId", orderId);
        localStorage.setItem("waConfirmed_" + orderId, "false");
        localStorage.setItem("webConfirmed_" + orderId, "false");

        // Build WhatsApp message (including return link)
        const returnUrl = window.location.origin + '/return.html?id=' + orderId;
        const itemLines = order.items.map(i => `- ${i.name} x${i.qty} = ${fmt(i.price * i.qty)}`).join('\n');
        const fullMessage = 
          `Halo Atmin, saya mau pesan:\n\n` +
          itemLines +
          `\n\nTotal: ${fmt(order.total)}` +
          `\nNama: ${name} (${cls} ${major})` +
          `\nAmbil: ${pickup}` +
          `\nOrder ID: ${orderId}` +
          `\n\nKembali ke website untuk ambil QR Pesanan: ${returnUrl}`;

        const msg = encodeURIComponent(fullMessage);

        // Clear cart
        cart = [];
        saveCart();
        updateCartUI();

        // Mark WhatsApp confirmed (since we'll open it)
        localStorage.setItem("waConfirmed_" + orderId, "true");
        let ords = JSON.parse(localStorage.getItem("orders")) || [];
        const idx = ords.findIndex(o => o.orderId === orderId);
        if (idx !== -1) {
          ords[idx].waConfirmed = true;
          localStorage.setItem("orders", JSON.stringify(ords));
        }

        document.getElementById('modalBg').classList.remove('active');
        window.closeDrawer();

        showToast('Pesanan Dibuat!', 'Mengarahkan ke WhatsApp...', 'success');

        // Open WhatsApp, then redirect back to website for QR
        setTimeout(() => {
          window.open(`https://wa.me/6285694458024?text=${msg}`, '_blank');
          setTimeout(() => {
            window.location.href = 'return.html?id=' + orderId;
          }, 800);
        }, 1000);

      } catch (err) {
        showToast('Error', 'Terjadi kesalahan. Coba lagi.', 'error');
      }
    };

    // ---------- TOAST ----------
    function showToast(title, msg, type = '') {
      const container = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = 'toast ' + type;
      t.innerHTML = `<div class="toast-title">${title}</div><div>${msg}</div>`;
      container.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    // ---------- INIT ----------
    renderProducts();
    updateCartUI();

    // Expose functions for inline onclick
    window.renderDrawer = renderDrawer;
  })();
</script>
</body>
</html>
