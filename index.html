<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> List Menu - Jajanan</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --text-muted: #64748b;
    --primary: #3b82f6;
    --primary-dark: #2563eb;
    --primary-light: #eff6ff;
    --border: #e2e8f0;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.10);
    --radius: 16px;
    --radius-sm: 10px;
    --success: #10b981;
    --danger: #ef4444;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--primary); }
  .cart-btn {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 10px 20px;
    font-family: inherit;
    font-size: .875rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all .2s;
  }
  .cart-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .cart-count {
    background: #fff;
    color: var(--primary);
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: .75rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* HERO */
  .hero {
    background: linear-gradient(135deg, #eff6ff 0%, #f0fdf4 100%);
    border-bottom: 1px solid var(--border);
    padding: 48px 20px 40px;
    text-align: center;
  }
  .hero-tag {
    display: inline-block;
    background: var(--primary-light);
    color: var(--primary);
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 50px;
    margin-bottom: 16px;
  }
  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    line-height: 1.2;
    margin-bottom: 12px;
    color: var(--text);
  }
  .hero p {
    color: var(--text-muted);
    font-size: .95rem;
    max-width: 400px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* PRODUCTS */
  .section { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
  .section-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 24px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }
  .product-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
  }
  .product-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
  .product-img {
    width: 100%;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f1f5f9;
    padding: 24px;
  }
  .product-img svg { width: 100%; height: 100%; max-height: 180px; }
  .product-body { padding: 20px; }
  .product-name {
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .product-desc {
    font-size: .8rem;
    color: var(--text-muted);
    margin-bottom: 16px;
    line-height: 1.5;
  }
  .product-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .product-price {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--primary);
  }
  .qty-ctrl {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .qty-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    color: var(--text);
  }
  .qty-btn:hover { border-color: var(--primary); color: var(--primary); }
  .qty-val { font-weight: 700; font-size: .95rem; min-width: 20px; text-align: center; }
  .add-btn {
    width: 100%;
    margin-top: 16px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 12px;
    font-family: inherit;
    font-size: .875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .add-btn:hover { background: var(--primary-dark); }
  .add-btn:active { transform: scale(.98); }

  /* CART DRAWER */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(15,23,42,.4);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    backdrop-filter: blur(2px);
  }
  .overlay.active { opacity: 1; pointer-events: all; }
  .drawer {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: min(420px, 100vw);
    background: var(--card);
    z-index: 201;
    box-shadow: -8px 0 40px rgba(0,0,0,.12);
    transform: translateX(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
  }
  .drawer.active { transform: translateX(0); }
  .drawer-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .drawer-title { font-size: 1.05rem; font-weight: 700; }
  .close-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    color: var(--text-muted);
    transition: all .15s;
  }
  .close-btn:hover { border-color: var(--danger); color: var(--danger); }
  .drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
  }
  .empty-cart {
    text-align: center;
    padding: 48px 16px;
    color: var(--text-muted);
  }
  .empty-cart-icon {
    width: 64px; height: 64px;
    background: var(--bg);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 1.8rem;
  }
  .cart-item {
    display: flex;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .cart-item:last-child { border-bottom: none; }
  .cart-item-thumb {
    width: 56px; height: 56px;
    background: #f1f5f9;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cart-item-thumb svg { width: 40px; height: 40px; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-weight: 600; font-size: .9rem; margin-bottom: 4px; }
  .cart-item-price { font-size: .8rem; color: var(--text-muted); }
  .cart-item-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  .ci-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .85rem;
    font-weight: 700;
    transition: all .15s;
    color: var(--text);
  }
  .ci-btn:hover { border-color: var(--primary); color: var(--primary); }
  .ci-qty { font-weight: 700; font-size: .85rem; min-width: 16px; text-align: center; }
  .ci-total { font-weight: 700; font-size: .9rem; color: var(--primary); }
  .ci-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: .9rem;
    padding: 4px;
    border-radius: 6px;
    transition: color .15s;
  }
  .ci-del:hover { color: var(--danger); }

  /* CHECKOUT */
  .drawer-checkout {
    border-top: 1px solid var(--border);
    padding: 20px 24px;
    flex-shrink: 0;
    background: var(--card);
  }
  .cart-summary {
    display: flex;
    justify-content: space-between;
    margin-bottom: 16px;
    font-weight: 700;
    font-size: 1rem;
  }
  .checkout-toggle-btn {
    width: 100%;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 13px;
    font-family: inherit;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
  }
  .checkout-toggle-btn:hover { background: var(--primary-dark); }

  /* CHECKOUT FORM MODAL */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(15,23,42,.5);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
    backdrop-filter: blur(2px);
  }
  .modal-bg.active { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card);
    width: min(500px, 100vw);
    max-height: 90vh;
    border-radius: 24px 24px 0 0;
    overflow-y: auto;
    padding: 28px 24px 32px;
    transform: translateY(40px);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  .modal-bg.active .modal { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 24px;
  }
  .modal-title {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 20px;
  }
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: .8rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 6px;
  }
  .form-input, .form-select {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    font-family: inherit;
    font-size: .9rem;
    color: var(--text);
    background: var(--bg);
    transition: border-color .15s;
    appearance: none;
  }
  .form-input:focus, .form-select:focus {
    outline: none;
    border-color: var(--primary);
    background: var(--card);
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .order-summary-box {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 20px;
  }
  .order-sum-row {
    display: flex;
    justify-content: space-between;
    font-size: .85rem;
    margin-bottom: 6px;
    color: var(--text-muted);
  }
  .order-sum-row:last-child {
    margin-bottom: 0;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    font-weight: 700;
    color: var(--text);
    font-size: .95rem;
  }
  .submit-btn {
    width: 100%;
    background: #25d366;
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 14px;
    font-family: inherit;
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background .2s;
  }
  .submit-btn:hover { background: #1db954; }

  /* POPUP TOAST */
  .toast-container {
    position: fixed;
    top: 80px;
    right: 20px;
    z-index: 500;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
  }
  .toast {
    background: var(--card);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    box-shadow: var(--shadow-lg);
    border-left: 3px solid var(--primary);
    font-size: .875rem;
    font-weight: 500;
    max-width: 300px;
    animation: slideIn .3s ease, fadeOut .3s ease 2.5s forwards;
    pointer-events: all;
  }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }
  .toast-title { font-weight: 700; margin-bottom: 2px; font-size: .9rem; }
  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes fadeOut {
    to { opacity: 0; transform: translateX(20px); }
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 32px 20px;
    color: var(--text-muted);
    font-size: .8rem;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }

  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .product-grid { grid-template-columns: 1fr; }
    .drawer { width: 100vw; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
<div class="logo">Min<span>Bite</span></div>
    <button class="cart-btn" onclick="openDrawer()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Keranjang
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<div class="hero">
  <div class="hero-tag">Jajanan Sekolah</div>
  <h1>Snack Enak,<br><em>Harga Bersahabat</em></h1>
  <p>Pesan sekarang, ambil pas istirahat. Praktis, sat-set, langsung dapat.</p>
</div>

<div class="section">
  <div class="section-title">Menu Tersedia</div>
  <div class="product-grid" id="productGrid"></div>
</div>

<footer>MinBite &copy; 2025 &mdash; Jajanan Sekolah Terbaik</footer>

<!-- OVERLAY + DRAWER -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title">Keranjang Belanja</div>
    <button class="close-btn" onclick="closeDrawer()">&#x2715;</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-checkout" id="drawerCheckout" style="display:none">
    <div class="cart-summary">
      <span>Total</span>
      <span id="cartTotal">Rp 0</span>
    </div>
    <button class="checkout-toggle-btn" onclick="openCheckout()">Lanjut Checkout</button>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Detail Pemesanan</div>
    <div class="order-summary-box" id="orderSummaryBox"></div>
    <form onsubmit="handleCheckout(event)">
      <div class="form-group">
        <label class="form-label">Nama Lengkap</label>
        <input class="form-input" id="fName" placeholder="Nama kamu..." required>

      <div class="form-row">

            <option value="">Pilih</option>
            <option>X</option><option>XI</option><option>XII</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Jurusan</label>
          <select class="form-select" id="fMajor" required>
            <option value="">Pilih</option>
            <option>AK</option><option>MM</option><option>MP</option><option>TKJ</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Nomor WhatsApp</label>
        <input class="form-input" id="fPhone" placeholder="08xxxxxxxxxx" pattern="08[0-9]{8,11}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Waktu Pengambilan</label>
        <select class="form-select" id="fPickup" required>
          <option value="">Pilih waktu</option>
          <option value="12.00-13.00">12.00 – 13.00</option>
          <option value="13.00-14.00">13.00 – 14.00</option>
        </select>
      </div>
      <button type="submit" class="submit-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 16.849c-.282.792-1.392 1.52-2.228 1.707-.588.132-1.355.238-3.935-.846-2.999-1.295-4.934-4.296-5.084-4.496-.149-.199-1.213-1.612-1.213-3.075 0-1.462.767-2.18 1.04-2.478.272-.298.594-.372.792-.372.198 0 .396.002.57.01.183.01.428-.069.67.51.247.594.841 2.058.916 2.207.074.148.124.322.025.52-.099.199-.149.323-.298.497-.149.174-.312.388-.446.52-.148.148-.304.309-.13.606.173.298.77 1.271 1.653 2.059 1.135 1.012 2.093 1.325 2.39 1.475.297.148.471.124.644-.075.173-.198.743-.867.94-1.164.198-.298.396-.249.67-.15.272.1 1.732.818 2.029.967.298.149.497.223.57.347.074.124.074.719-.173 1.413z"/></svg>
        Kirim ke WhatsApp
      </button>
    </form>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
try {
  // PRODUCTS
  const PRODUCTS = [
    {
      id: 'oreo',
      name: 'Bola Oreo Susu',
      price: 8000,
      desc: 'Bola coklat Oreo lembut, taburan susu bubuk, tekstur kriuk di luar lembut di dalam.',

        </defs>

        <ellipse cx="100" cy="138" rx="72" ry="12" fill="#e2e8f0" opacity=".6"/>

        <!-- Balls front row -->
        <circle cx="100" cy="108" r="32" fill="url(#ball1)" filter="url(#softShadow)"/>
        <circle cx="58" cy="98" r="2" fill="#fff" opacity=".2"/>
        <circle cx="130" cy="96" r="2" fill="#fff" opacity=".2"/>
        <circle cx="94" cy="100" r="3" fill="#fff" opacity=".18"/>
        <!-- Milk powder sprinkles -->
        <g fill="#f8fafc" opacity=".7">
          <ellipse cx="80" cy="82" rx="5" ry="2" transform="rotate(-20 80 82)"/>
          <ellipse cx="118" cy="78" rx="4" ry="1.5" transform="rotate(15 118 78)"/>

          <ellipse cx="134" cy="86" rx="4" ry="1.5" transform="rotate(-25 134 86)"/>
          <ellipse cx="88" cy="78" rx="3" ry="1" transform="rotate(10 88 78)"/>
          <ellipse cx="112" cy="90" rx="3.5" ry="1.5" transform="rotate(-15 112 90)"/>

        <!-- shine -->
        <ellipse cx="90" cy="96" rx="8" ry="5" fill="#fff" opacity=".08" transform="rotate(-20 90 96)"/>
        <ellipse cx="125" cy="92" rx="6" ry="4" fill="#fff" opacity=".07" transform="rotate(-20 125 92)"/>
      </svg>`
    },
    {
      id: 'mac',
      name: 'Mac and Cheese',
      price: 10000,
      desc: 'Makaroni matang sempurna, saus keju meleleh hangat, gurih setiap suapan.',
      svg: `<svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bowlGrad" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#fff8f0"/>

          <radialGradient id="cheeseGrad" cx="40%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#fde68a"/>
            <stop offset="100%" stop-color="#f59e0b"/>
          </radialGradient>
          <filter id="bowlShadow">
            <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#d97706" flood-opacity="0.2"/>
          </filter>
        </defs>
        <!-- Bowl shadow -->
        <ellipse cx="100" cy="140" rx="60" ry="10" fill="#fdba74" opacity=".3"/>
        <!-- Bowl body -->
        <path d="M40 95 Q40 140 100 142 Q160 140 160 95 Z" fill="url(#bowlGrad)" filter="url(#bowlShadow)"/>
        <!-- Bowl rim -->
        <ellipse cx="100" cy="95" rx="60" ry="14" fill="#fed7aa"/>
        <ellipse cx="100" cy="93" rx="57" ry="11" fill="#fff8f0"/>
        <!-- Mac -->
        <g fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round">
          <path d="M70 108 Q70 100 78 100 Q86 100 86 108 Q86 116 78 116"/>
          <path d="M88 112 Q88 103 96 103 Q104 103 104 112 Q104 121 96 121"/>
          <path d="M106 108 Q106 100 114 100 Q122 100 122 108 Q122 116 114 116"/>
          <path d="M76 123 Q76 114 84 114 Q92 114 92 123"/>
          <path d="M100 120 Q100 112 108 112 Q116 112 116 120 Q116 128 108 128"/>
        </g>
        <!-- Cheese sauce drizzle -->
        <path d="M55 95 Q65 110 60 125" stroke="#f59e0b" stroke-width="8" stroke-linecap="round" fill="none" opacity=".5"/>
        <path d="M130 95 Q140 112 135 128" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" fill="none" opacity=".5"/>
        <ellipse cx="100" cy="95" rx="42" ry="9" fill="url(#cheeseGrad)" opacity=".85"/>
        <!-- cheese bubbles -->
        <circle cx="85" cy="94" r="4" fill="#fde68a" opacity=".9"/>
        <circle cx="105" cy="92" r="5" fill="#fef3c7" opacity=".9"/>
        <circle cx="118" cy="96" r="3" fill="#fde68a" opacity=".9"/>
        <circle cx="72" cy="96" r="3.5" fill="#fef3c7" opacity=".9"/>
        <!-- Steam -->
        <g stroke="#94a3b8" stroke-width="1.5" fill="none" stroke-linecap="round" opacity=".4">
          <path d="M88 76 Q85 70 88 64 Q91 58 88 52"/>
          <path d="M100 72 Q97 66 100 60 Q103 54 100 48"/>
          <path d="M112 76 Q109 70 112 64 Q115 58 112 52"/>
        </g>
      </svg>`
    }
  ];

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let qty = { oreo: 1, mac: 1 };

  function fmt(n) { return 'Rp ' + n.toLocaleString('id-ID'); }

  function renderProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = PRODUCTS.map(p => `
      <div class="product-card">
        <div class="product-img">${p.svg}</div>
        <div class="product-body">
          <div class="product-name">${p.name}</div>
          <div class="product-desc">${p.desc}</div>
          <div class="product-footer">
            <div class="product-price">${fmt(p.price)}</div>
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="changeQty('${p.id}', -1)">&#x2212;</button>
              <span class="qty-val" id="qty-${p.id}">${qty[p.id]}</span>
              <button class="qty-btn" onclick="changeQty('${p.id}', 1)">&#x2B;</button>
            </div>
          </div>
          <button class="add-btn" onclick="addToCart('${p.id}')">Tambah ke Keranjang</button>
        </div>
      </div>
    `).join('');
  }

  function changeQty(id, delta) {
    qty[id] = Math.max(1, (qty[id] || 1) + delta);
    const el = document.getElementById('qty-' + id);
    if (el) el.textContent = qty[id];
  }

  function addToCart(id) {
    try {
      const p = PRODUCTS.find(x => x.id === id);
      const q = qty[id] || 1;
      const existing = cart.find(x => x.id === id);
      if (existing) existing.qty += q;
      else cart.push({ id: p.id, name: p.name, price: p.price, qty: q, svg: p.svg });
      saveCart();
      updateCartUI();
      showToast('Ditambahkan!', `${p.name} x${q} masuk keranjang.`, 'success');
    } catch(e) { showToast('Error', 'Gagal menambah item.', 'error'); }
  }

  function removeFromCart(id) {
    cart = cart.filter(x => x.id !== id);
    saveCart();
    updateCartUI();
    renderDrawer();
  }

  function updateCartQty(id, delta) {
    const item = cart.find(x => x.id === id);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) { removeFromCart(id); return; }
    saveCart();
    updateCartUI();
    renderDrawer();
  }

  function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cart));
  }

  function cartTotal() {
    return cart.reduce((s, i) => s + i.price * i.qty, 0);
  }

  function updateCartUI() {
    const total = cart.reduce((s, i) => s + i.qty, 0);
    document.getElementById('cartCount').textContent = total;
    document.getElementById('cartTotal').textContent = fmt(cartTotal());
    const co = document.getElementById('drawerCheckout');
    if (co) co.style.display = cart.length ? 'block' : 'none';
  }

  function renderDrawer() {
    const body = document.getElementById('drawerBody');
    if (!cart.length) {
      body.innerHTML = `<div class="empty-cart">
        <div class="empty-cart-icon">
          <svg width="28" height="28" fill="none" stroke="#94a3b8" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        </div>
        <div style="font-weight:600;margin-bottom:6px;">Keranjang Kosong</div>
        <div style="font-size:.85rem;color:var(--text-muted);">Tambahkan produk dari menu di atas.</div>
      </div>`;
      return;
    }
    body.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="cart-item-thumb">${item.svg}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">${fmt(item.price)} / pcs</div>
          <div class="cart-item-actions">
            <button class="ci-btn" onclick="updateCartQty('${item.id}', -1)">&#x2212;</button>
            <span class="ci-qty">${item.qty}</span>
            <button class="ci-btn" onclick="updateCartQty('${item.id}', 1)">&#x2B;</button>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
          <div class="ci-total">${fmt(item.price * item.qty)}</div>
          <button class="ci-del" onclick="removeFromCart('${item.id}')" title="Hapus">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
          </button>
        </div>
      </div>
    `).join('');
  }

  function openDrawer() {
    renderDrawer();
    updateCartUI();
    document.getElementById('overlay').classList.add('active');
    document.getElementById('drawer').classList.add('active');
  }

  function closeDrawer() {
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('drawer').classList.remove('active');
  }

  function openCheckout() {
    if (!cart.length) { showToast('Perhatian', 'Keranjang masih kosong!', 'error'); return; }
    const box = document.getElementById('orderSummaryBox');
    box.innerHTML = cart.map(i => `
      <div class="order-sum-row"><span>${i.name} x${i.qty}</span><span>${fmt(i.price * i.qty)}</span></div>
    `).join('') + `<div class="order-sum-row"><span>Total</span><span>${fmt(cartTotal())}</span></div>`;
    document.getElementById('modalBg').classList.add('active');
  }

  document.getElementById('modalBg').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('active');
  });

  function generateOrderId() {
    return 'ORD' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substr(2,3).toUpperCase();
  }

  function handleCheckout(e) {
    e.preventDefault();
    try {
      const name = document.getElementById('fName').value.trim();
      const cls = document.getElementById('fClass').value;
      const major = document.getElementById('fMajor').value;
      const phone = document.getElementById('fPhone').value.trim();
      const pickup = document.getElementById('fPickup').value;
      if (!name || !cls || !major || !phone || !pickup) {
        showToast('Lengkapi Data', 'Semua kolom wajib diisi.', 'error'); return;
      }
      if (!phone.startsWith('08') || phone.length < 10) {
        showToast('Nomor Salah', 'Nomor WA harus diawali 08.', 'error'); return;
      }

      const orderId = generateOrderId();
      const order = {
        orderId, name, class: cls, major, phone, pickup,
        items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
        total: cartTotal(),
        status: 'MENUNGGU',
        waConfirmed: false,
        webConfirmed: false,
        createdAt: new Date().toISOString()
      };

      let orders = JSON.parse(localStorage.getItem("orders")) || [];
      orders.push(order);
      localStorage.setItem("orders", JSON.stringify(orders));
      localStorage.setItem("lastOrderId", orderId);
      localStorage.setItem("waConfirmed_" + orderId, "false");
      localStorage.setItem("webConfirmed_" + orderId, "false");

      // Build WA message
      const itemStr = order.items.map(i => `- ${i.name} x${i.qty} = ${fmt(i.price * i.qty)}`).join('%0A');
      const msg = encodeURIComponent(
        `Halo Atmin, saya mau pesan:%0A%0A` +
        order.items.map(i => `- ${i.name} x${i.qty} = ${fmt(i.price * i.qty)}`).join('\n') +
        `\n\nTotal: ${fmt(order.total)}` +
        `\nNama: ${name} (${cls} ${major})` +
        `\nAmbil: ${pickup}` +
        `\nOrder ID: ${orderId}`
      );

      // Clear cart
      cart = [];
      saveCart();
      updateCartUI();

      localStorage.setItem("waConfirmed_" + orderId, "true");
      // Update order waConfirmed
      let ords = JSON.parse(localStorage.getItem("orders")) || [];
      const idx = ords.findIndex(o => o.orderId === orderId);
      if (idx !== -1) { ords[idx].waConfirmed = true; localStorage.setItem("orders", JSON.stringify(ords)); }

      document.getElementById('modalBg').classList.remove('active');
      closeDrawer();

      showToast('Pesanan Dibuat!', 'Kamu akan diarahkan ke WhatsApp.', 'success');

      setTimeout(() => {
        window.open(`https://wa.me/6281234567890?text=${msg}`, '_blank');
        setTimeout(() => { window.location.href = 'return.html?id=' + orderId; }, 800);
      }, 1000);

    } catch(err) { showToast('Error', 'Terjadi kesalahan. Coba lagi.', 'error'); }
  }

  function showToast(title, msg, type = '') {
    const container = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.innerHTML = `<div class="toast-title">${title}</div><div>${msg}</div>`;
    container.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  renderProducts();
  updateCartUI();
} catch(e) { console.error(e); }
</script>
</body>
</html>
