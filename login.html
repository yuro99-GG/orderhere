<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --text-muted: #64748b;
    --primary: #3b82f6;
    --primary-dark: #2563eb;
    --primary-light: #eff6ff;
    --border: #e2e8f0;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.10);
    --radius: 16px;
    --radius-sm: 10px;
    --danger: #ef4444;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    right: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, #dbeafe 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    left: -15%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, #f0fdf4 0%, transparent 70%);
    pointer-events: none;
  }
  .login-card {
    background: var(--card);
    border-radius: 24px;
    box-shadow: var(--shadow-lg), 0 0 0 1px var(--border);
    padding: 44px 40px;
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 1;
    animation: fadeUp .4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .brand {
    text-align: center;
    margin-bottom: 32px;
  }
  .brand-icon {
    width: 56px; height: 56px;
    background: var(--primary-light);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
  }
  .brand-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .brand-name span { color: var(--primary); }
  .brand-sub {
    font-size: .82rem;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-size: .8rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 7px;
  }
  .input-wrap { position: relative; }
  .form-input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-family: inherit;
    font-size: .9rem;
    color: var(--text);
    background: var(--bg);
    transition: all .15s;
  }
  .form-input:focus {
    outline: none;
    border-color: var(--primary);
    background: var(--card);
    box-shadow: 0 0 0 3px rgba(59,130,246,.1);
  }
  .form-input.error { border-color: var(--danger); }
  .eye-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color .15s;
  }
  .eye-btn:hover { color: var(--primary); }
  .error-msg {
    color: var(--danger);
    font-size: .8rem;
    font-weight: 500;
    margin-top: 8px;
    display: none;
    align-items: center;
    gap: 4px;
  }
  .error-msg.show { display: flex; }
  .login-btn {
    width: 100%;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 13px;
    font-family: inherit;
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    margin-top: 8px;
    letter-spacing: .01em;
  }
  .login-btn:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,.3); }
  .login-btn:active { transform: translateY(0); }
  .login-btn:disabled { opacity: .7; cursor: not-allowed; transform: none; }
  .back-link {
    text-align: center;
    margin-top: 20px;
    font-size: .82rem;
    color: var(--text-muted);
  }
  .back-link a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
  }
  .back-link a:hover { text-decoration: underline; }
  .shake { animation: shake .4s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <div class="brand-icon">
      <svg width="28" height="28" fill="none" stroke="#3b82f6" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
    </div>
    <div class="brand-name">Kuzo<span>Snacks</span></div>
    <div class="brand-sub">Admin Dashboard</div>
  </div>

  <form id="loginForm" onsubmit="doLogin(event)">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" id="username" type="text" placeholder="Masukkan username" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <input class="form-input" id="password" type="password" placeholder="Masukkan password" autocomplete="current-password" style="padding-right:44px">
        <button type="button" class="eye-btn" onclick="togglePass()" id="eyeBtn">
          <svg id="eyeIcon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="error-msg" id="errorMsg">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Username atau password salah.
      </div>
    </div>
    <button type="submit" class="login-btn" id="loginBtn">Masuk ke Dashboard</button>
  </form>

  <div class="back-link">
    Kembali ke <a href="index.html">Toko</a>
  </div>
</div>

<script>
try {
  if (localStorage.getItem("isAdmin") === "true") {
    window.location.href = 'admin.html';
  }

  function togglePass() {
    const p = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (p.type === 'password') {
      p.type = 'text';
      icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      p.type = 'password';
      icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }
  }

  function doLogin(e) {
    e.preventDefault();
    try {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      const card = document.querySelector('.login-card');

      btn.disabled = true;
      btn.textContent = 'Memeriksa...';

      setTimeout(() => {
        if (u === 'kuzo' && p === 'kuzotamvan') {
          localStorage.setItem("isAdmin", "true");
          btn.textContent = 'Berhasil! Mengalihkan...';
          setTimeout(() => { window.location.href = 'admin.html'; }, 600);
        } else {
          err.classList.add('show');
          document.getElementById('username').classList.add('error');
          document.getElementById('password').classList.add('error');
          card.classList.add('shake');
          setTimeout(() => card.classList.remove('shake'), 400);
          btn.disabled = false;
          btn.textContent = 'Masuk ke Dashboard';
          setTimeout(() => {
            err.classList.remove('show');
            document.getElementById('username').classList.remove('error');
            document.getElementById('password').classList.remove('error');
          }, 3000);
        }
      }, 600);
    } catch(err) { console.error(err); }
  }
} catch(e) { console.error(e); }
</script>
</body>
</html>
