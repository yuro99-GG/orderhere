<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MinBite · Detail Pesanan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f5;--bg2:#f2ede6;--card:#fff;--text:#2c2420;--muted:#7a6b5d;--accent:#c8956c;--accent-d:#a67350;--border:#e8e0d5;--shadow:0 4px 24px rgba(44,36,32,.08);--r:20px;--serif:'Playfair Display',Georgia,serif;--sans:'Inter',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
header{background:rgba(250,248,245,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:.9rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-family:var(--serif);font-size:1.3rem;font-weight:700;color:var(--text);text-decoration:none}.logo span{color:var(--accent)}
.admin-link{font-size:.8rem;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:.3rem;background:var(--bg2);padding:.4rem .9rem;border-radius:8px;border:1px solid var(--border);transition:all .15s}
.admin-link:hover{border-color:var(--accent);color:var(--accent)}
.page-wrap{max-width:480px;margin:0 auto;padding:2rem 1.25rem 4rem}
/* STATUS BADGE */
.status-badge{display:inline-flex;align-items:center;gap:.45rem;padding:.5rem 1.2rem;border-radius:50px;font-size:.82rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:1.5rem}
.s-MENUNGGU{background:#fff3e0;color:#c65000}
.s-DIPROSES{background:#e3f2fd;color:#1255a4}
.s-SIAP{background:#e8f5e9;color:#27742e}
.s-DIBATALKAN{background:#fde8e8;color:#b81c1c}
.pulse{width:8px;height:8px;border-radius:50%;animation:pulse 1.5s ease infinite}
.s-MENUNGGU .pulse{background:#c65000}.s-DIPROSES .pulse{background:#1255a4}.s-SIAP .pulse{background:#27742e}.s-DIBATALKAN .pulse{background:#b81c1c;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
/* CARD */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);padding:1.5rem;margin-bottom:1.25rem}
.card-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.85rem}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:.55rem 0;border-bottom:1px solid var(--border);font-size:.9rem}
.item-row:last-child{border-bottom:none}
.total-row{font-weight:700;font-size:1rem;border-top:2px solid var(--border);border-bottom:none;padding-top:.75rem;margin-top:.25rem}
.total-row span:last-child{color:var(--accent)}
/* INFO GRID */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
.info-item label{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.3rem}
.info-item .val{font-size:.9rem;font-weight:500}
.masked{font-family:monospace;letter-spacing:.05em}
/* ORDER HEADER */
.order-heading{font-family:var(--serif);font-size:1.65rem;margin-bottom:.35rem}
.order-id-text{font-size:.8rem;color:var(--muted);font-weight:500;margin-bottom:1.5rem}
/* CONFIRM BUTTON */
.confirm-section{background:linear-gradient(135deg,#e8f5e9,#d4edda);border-radius:var(--r);border:1px solid #c3e6cb;padding:1.75rem;margin-bottom:1.25rem;text-align:center}
.confirm-section h3{font-family:var(--serif);font-size:1.2rem;color:#27742e;margin-bottom:.5rem}
.confirm-section p{color:#476c4a;font-size:.85rem;margin-bottom:1.25rem;line-height:1.5}
.confirm-btn{background:#27742e;color:#fff;border:none;padding:.9rem 2rem;border-radius:50px;font-family:var(--sans);font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s;box-shadow:0 4px 14px rgba(39,116,46,.25)}
.confirm-btn:hover{background:#1d5e23}
.confirmed-tag{display:inline-flex;align-items:center;gap:.5rem;background:#27742e;color:#fff;padding:.6rem 1.5rem;border-radius:50px;font-size:.9rem;font-weight:600}
/* PRIVACY NOTE */
.privacy-note{display:flex;align-items:center;gap:.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.6rem 1rem;font-size:.75rem;color:var(--muted);margin-bottom:1.25rem}
/* CANCELLED BANNER */
.cancelled-banner{background:#fde8e8;border:1px solid #f5c0c0;border-radius:var(--r);padding:1.5rem;text-align:center;margin-bottom:1.25rem;color:#b81c1c}
.cancelled-banner h3{font-family:var(--serif);font-size:1.1rem;margin-bottom:.35rem}
/* NOT FOUND */
.not-found{text-align:center;padding:5rem 2rem}
.not-found h2{font-family:var(--serif);font-size:1.4rem;margin-bottom:.75rem}
.not-found p{color:var(--muted);margin-bottom:1.5rem}
.not-found a{color:var(--accent);text-decoration:none;font-weight:600}
/* TOAST */
.toast-container{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:.5rem;align-items:center;pointer-events:none}
.toast{background:var(--text);color:#fff;padding:.7rem 1.4rem;border-radius:50px;font-size:.875rem;font-weight:500;animation:tin .3s ease,tout .3s ease 2.5s forwards;box-shadow:0 4px 16px rgba(44,36,32,.2);white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateY(14px)}}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">Min<span>Bite</span></a>
  <a href="admin.html" class="admin-link">← Admin</a>
</header>

<div class="page-wrap" id="pageContent">
  <div style="text-align:center;padding:3rem 1rem;color:var(--muted)">Memuat…</div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
function fmtRp(n){return 'Rp\u00a0'+Number(n).toLocaleString('id-ID')}
function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.getElementById('toastContainer').appendChild(t);setTimeout(()=>t.remove(),3100)}

function maskName(name){
  if(!name) return '—';
  return name.trim().split(/\s+/).map(part=>part.charAt(0)+'***').join(' ');
}

function statusClass(s){
  if(s==='MENUNGGU') return 's-MENUNGGU';
  if(s==='DIPROSES') return 's-DIPROSES';
  if(s==='SIAP DIAMBIL') return 's-SIAP';
  if(s==='DIBATALKAN') return 's-DIBATALKAN';
  return 's-MENUNGGU';
}
function statusEmoji(s){
  const m={'MENUNGGU':'⏳','DIPROSES':'⚙️','SIAP DIAMBIL':'✅','DIBATALKAN':'❌'};
  return (m[s]||'•')+' '+s;
}

const params=new URLSearchParams(location.search);
const orderId=params.get('id');

function getOrders(){return JSON.parse(localStorage.getItem('orders')||'[]')}

function confirmPickup(){
  const orders=getOrders();
  const o=orders.find(x=>x.id===orderId);
  if(!o) return;
  if(!confirm('Konfirmasi pengambilan pesanan ini?')) return;
  o.status='DIBATALKAN'; // mark as completed — using a final state
  // Actually spec says "mark as completed" — we'll add a SELESAI status or just use DIBATALKAN
  // Re-reading spec: "mark as completed" — let's set a custom completed state
  // We'll update status to "SELESAI" for semantic clarity even if it's not in the badge list
  o.status = 'SELESAI';
  localStorage.setItem('orders',JSON.stringify(orders));
  showToast('Pengambilan dikonfirmasi! ✅');
  setTimeout(renderPage, 800);
}

function renderPage(){
  if(!orderId){renderNotFound();return;}
  const orders=getOrders();
  const order=orders.find(o=>o.id===orderId);
  if(!order){renderNotFound();return;}

  const sc=statusClass(order.status);
  const isReady=order.status==='SIAP DIAMBIL';
  const isCancelled=order.status==='DIBATALKAN';
  const isSelesai=order.status==='SELESAI';
  const d=new Date(order.timestamp);
  const dateStr=d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});

  let html=`
    <h1 class="order-heading">Detail Pesanan</h1>
    <div class="order-id-text"><code>${order.id}</code> &nbsp;·&nbsp; ${dateStr}</div>`;

  // Status badge
  const dispStatus = isSelesai ? 'SELESAI' : order.status;
  const badgeClass = isSelesai ? 's-SIAP' : sc;
  html+=`<div class="status-badge ${badgeClass}"><span class="pulse"></span>${statusEmoji(dispStatus)}</div>`;

  // Cancelled banner
  if(isCancelled){
    html+=`<div class="cancelled-banner"><h3>❌ Pesanan Dibatalkan</h3><p>Pesanan ini telah dibatalkan oleh penjual.</p></div>`;
  }

  // Ready / confirm section
  if(isReady){
    html+=`<div class="confirm-section">
      <h3>✅ Siap Diambil!</h3>
      <p>Pelanggan sudah bisa mengambil pesanannya. Klik tombol di bawah setelah pesanan diserahkan.</p>
      <button class="confirm-btn" onclick="confirmPickup()">Konfirmasi Pengambilan</button>
    </div>`;
  }

  if(isSelesai){
    html+=`<div class="confirm-section">
      <h3>🎉 Sudah Diambil</h3>
      <p>Pesanan ini telah berhasil diserahkan ke pelanggan.</p>
      <span class="confirmed-tag">✓ Selesai</span>
    </div>`;
  }

  // Privacy note
  html+=`<div class="privacy-note">🔒 Informasi pelanggan ditampilkan dalam format anonim untuk privasi.</div>`;

  // Items
  html+=`<div class="card"><div class="card-label">Item Pesanan</div>`;
  order.items.forEach(i=>{
    html+=`<div class="item-row"><span>${i.name} <span style="color:var(--muted)">× ${i.qty}</span></span><span style="font-weight:600">${fmtRp(i.price*i.qty)}</span></div>`;
  });
  if(order.discount>0){
    html+=`<div class="item-row" style="color:#2a7a4b"><span>Diskon (${order.promoCode})</span><span>−${fmtRp(order.discount)}</span></div>`;
  }
  html+=`<div class="item-row total-row"><span>Total</span><span>${fmtRp(order.total)}</span></div></div>`;

  // Info (privacy-masked)
  html+=`<div class="card"><div class="card-label">Info Pelanggan (Anonim)</div>
    <div class="info-grid">
      <div class="info-item"><label>Nama</label><div class="val masked">${maskName(order.customer.name)}</div></div>
      <div class="info-item"><label>Kelas</label><div class="val">${order.customer.kelas} ${order.customer.jurusan}</div></div>
      <div class="info-item"><label>Waktu Ambil</label><div class="val">${order.customer.pickup}</div></div>
      <div class="info-item"><label>No. WA</label><div class="val masked">08•••••••••</div></div>
    </div>
  </div>`;

  document.getElementById('pageContent').innerHTML=html;
}

function renderNotFound(){
  document.getElementById('pageContent').innerHTML=`
    <div class="not-found">
      <div style="font-size:3rem;margin-bottom:1rem">🔍</div>
      <h2>Pesanan Tidak Ditemukan</h2>
      <p>ID pesanan tidak valid atau tidak ditemukan.</p>
      <a href="admin.html">← Kembali ke Admin</a>
    </div>`;
}

renderPage();
</script>
</body>
</html>
