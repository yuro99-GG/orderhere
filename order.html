<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuzoSnacks — Detail Pesanan</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --text-muted: #64748b;
    --primary: #3b82f6;
    --primary-dark: #2563eb;
    --primary-light: #eff6ff;
    --border: #e2e8f0;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.10);
    --radius: 16px;
    --radius-sm: 10px;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* TOPBAR */
  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-inner {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 20px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.4rem; }
  .logo span { color: var(--primary); }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: var(--text-muted);
    font-size: .875rem;
    font-weight: 600;
    transition: color .15s;
  }
  .back-btn:hover { color: var(--primary); }

  /* MAIN */
  .main {
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* STATUS BANNER */
  .status-banner {
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .status-banner.MENUNGGU { background: #fef3c7; border: 1px solid #fde68a; }
  .status-banner.DIPROSES { background: var(--primary-light); border: 1px solid #bfdbfe; }
  .status-banner.SIAP_DIAMBIL { background: #d1fae5; border: 1px solid #a7f3d0; }
  .status-banner.DIBATALKAN { background: #fee2e2; border: 1px solid #fecaca; }
  .status-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,.7);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .status-info-title { font-weight: 700; font-size: 1rem; margin-bottom: 3px; }
  .status-info-sub { font-size: .82rem; color: var(--text-muted); }

  /* CARD */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .card-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
    font-size: .9rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-body { padding: 20px; }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .info-row:last-child { border-bottom: none; padding-bottom: 0; }
  .info-row:first-child { padding-top: 0; }
  .info-label { font-size: .8rem; color: var(--text-muted); font-weight: 500; flex-shrink: 0; }
  .info-val { font-size: .9rem; font-weight: 600; text-align: right; }
  .order-id-val {
    font-family: 'Courier New', monospace;
    font-size: .85rem;
    color: var(--primary);
    font-weight: 700;
    text-align: right;
  }

  /* ITEMS */
  .item-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .item-row:last-child { border-bottom: none; }
  .item-name { font-weight: 600; font-size: .9rem; }
  .item-qty { font-size: .8rem; color: var(--text-muted); margin-top: 2px; }
  .item-price { font-weight: 700; color: var(--primary); }
  .total-row {
    display: flex;
    justify-content: space-between;
    padding-top: 14px;
    margin-top: 4px;
    border-top: 2px solid var(--border);
    font-weight: 800;
    font-size: 1rem;
  }
  .total-row span:last-child { color: var(--primary); }

  /* QR SECTION */
  .qr-section { text-align: center; }
  .qr-locked {
    padding: 32px 20px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    border: 2px dashed var(--border);
    text-align: center;
  }
  .qr-locked-icon {
    width: 56px; height: 56px;
    background: var(--card);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
    box-shadow: var(--shadow);
  }
  .qr-locked-title { font-weight: 700; margin-bottom: 6px; }
  .qr-locked-sub { font-size: .82rem; color: var(--text-muted); line-height: 1.5; }
  .qr-steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 16px;
    text-align: left;
  }
  .qr-step {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    font-size: .82rem;
    color: var(--text-muted);
  }
  .qr-step-num {
    width: 20px; height: 20px;
    background: var(--primary-light);
    color: var(--primary);
    border-radius: 50%;
    font-size: .7rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  #qrCanvas {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
  }
  #qrCanvas canvas, #qrCanvas img {
    border-radius: 12px !important;
  }
  .qr-url {
    font-size: .75rem;
    color: var(--text-muted);
    word-break: break-all;
    margin: 10px 0 16px;
    font-family: monospace;
    background: var(--bg);
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .dl-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 20px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: .875rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
    text-decoration: none;
  }
  .dl-btn:hover { background: var(--primary-dark); }

  /* CONFIRM BADGES */
  .confirm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .confirm-badge {
    padding: 14px;
    border-radius: var(--radius-sm);
    text-align: center;
    border: 1.5px solid;
  }
  .confirm-badge.ok { background: #d1fae5; border-color: #a7f3d0; }
  .confirm-badge.no { background: var(--bg); border-color: var(--border); }
  .confirm-badge-label { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); margin-bottom: 4px; }
  .confirm-badge-val { font-weight: 700; font-size: .9rem; }
  .confirm-badge.ok .confirm-badge-val { color: #065f46; }

  @media (max-width: 480px) {
    .main { padding: 20px 16px 48px; }
    .confirm-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">Kuzo<span>Snacks</span></div>
    <a href="index.html" class="back-btn">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Kembali
    </a>
  </div>
</div>

<div class="main" id="main">
  <div style="text-align:center;padding:60px 20px;color:var(--text-muted)">
    <div style="font-size:1.5rem;margin-bottom:12px">Memuat pesanan...</div>
  </div>
</div>

<script>
try {
  function fmt(n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }

  function getStatusInfo(status) {
    const map = {
      'MENUNGGU': { cls: 'MENUNGGU', icon: '&#x23F3;', color: '#92400e', label: 'Menunggu Konfirmasi', sub: 'Pesananmu sedang menunggu konfirmasi WA dan web.' },
      'DIPROSES': { cls: 'DIPROSES', icon: '&#x1F4E6;', color: '#1e40af', label: 'Sedang Diproses', sub: 'Pesananmu sedang diproses oleh admin.' },
      'SIAP DIAMBIL': { cls: 'SIAP_DIAMBIL', icon: '&#x2714;', color: '#065f46', label: 'Siap Diambil!', sub: 'Pesananmu siap diambil sesuai jadwal.' },
      'DIBATALKAN': { cls: 'DIBATALKAN', icon: '&#x2715;', color: '#991b1b', label: 'Pesanan Dibatalkan', sub: 'Pesanan ini telah dibatalkan.' },
    };
    return map[status] || map['MENUNGGU'];
  }

  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('id');
  const main = document.getElementById('main');

  if (!orderId) {
    main.innerHTML = `<div style="text-align:center;padding:60px 20px">
      <div style="font-size:1.1rem;font-weight:700;margin-bottom:8px;">Order ID tidak ditemukan</div>
      <a href="index.html" style="color:var(--primary);text-decoration:none;font-weight:600;">Kembali ke Toko</a>
    </div>`;
  } else {
    const orders = JSON.parse(localStorage.getItem("orders")) || [];
    const order = orders.find(o => o.orderId === orderId);

    if (!order) {
      main.innerHTML = `<div style="text-align:center;padding:60px 20px">
        <div style="font-size:1.1rem;font-weight:700;margin-bottom:8px;">Pesanan tidak ditemukan</div>
        <div style="color:var(--text-muted);margin-bottom:16px;font-size:.9rem;">Order ID: ${orderId}</div>
        <a href="index.html" style="color:var(--primary);text-decoration:none;font-weight:600;">Kembali ke Toko</a>
      </div>`;
    } else {
      const si = getStatusInfo(order.status);
      const qrUrl = `https://orderhere.vercel.app/order.html?id=${orderId}`;
      const canShowQR = order.waConfirmed && order.webConfirmed;
      const createdAt = order.createdAt ? new Date(order.createdAt).toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' }) : '-';

      main.innerHTML = `
        <!-- STATUS BANNER -->
        <div class="status-banner ${si.cls}" style="margin-bottom:24px">
          <div class="status-icon" style="color:${si.color}">${si.icon}</div>
          <div>
            <div class="status-info-title" style="color:${si.color}">${si.label}</div>
            <div class="status-info-sub">${si.sub}</div>
          </div>
        </div>

        <!-- ORDER INFO -->
        <div class="card">
          <div class="card-header">
            <span>Informasi Pesanan</span>
            <span style="font-family:monospace;font-size:.78rem;color:var(--text-muted)">${orderId}</span>
          </div>
          <div class="card-body">
            <div class="info-row">
              <span class="info-label">Nama</span>
              <span class="info-val">${order.name || '-'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Kelas / Jurusan</span>
              <span class="info-val">${order.class || '-'} ${order.major || ''}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Nomor WA</span>
              <span class="info-val">${order.phone || '-'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Waktu Ambil</span>
              <span class="info-val">${order.pickup || '-'}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Dipesan Pada</span>
              <span class="info-val">${createdAt}</span>
            </div>
          </div>
        </div>

        <!-- ITEMS -->
        <div class="card">
          <div class="card-header">Rincian Item</div>
          <div class="card-body">
            ${(order.items || []).map(item => `
              <div class="item-row">
                <div>
                  <div class="item-name">${item.name}</div>
                  <div class="item-qty">${item.qty} pcs &times; ${fmt(item.price)}</div>
                </div>
                <div class="item-price">${fmt(item.price * item.qty)}</div>
              </div>
            `).join('')}
            <div class="total-row">
              <span>Total Pembayaran</span>
              <span>${fmt(order.total || 0)}</span>
            </div>
          </div>
        </div>

        <!-- KONFIRMASI -->
        <div class="card">
          <div class="card-header">Status Konfirmasi</div>
          <div class="card-body">
            <div class="confirm-grid">
              <div class="confirm-badge ${order.waConfirmed ? 'ok' : 'no'}">
                <div class="confirm-badge-label">WhatsApp</div>
                <div class="confirm-badge-val">${order.waConfirmed ? 'Terkirim' : 'Belum'}</div>
              </div>
              <div class="confirm-badge ${order.webConfirmed ? 'ok' : 'no'}">
                <div class="confirm-badge-label">Web Konfirmasi</div>
                <div class="confirm-badge-val">${order.webConfirmed ? 'Dikonfirmasi' : 'Belum'}</div>
              </div>
            </div>
            ${!canShowQR ? `<div style="margin-top:14px;padding:10px 14px;background:var(--bg);border-radius:var(--radius-sm);font-size:.82rem;color:var(--text-muted);border:1px solid var(--border);">QR tiket akan muncul setelah kedua konfirmasi selesai.</div>` : ''}
          </div>
        </div>

        <!-- QR CODE -->
        <div class="card">
          <div class="card-header">Tiket QR Code</div>
          <div class="card-body qr-section">
            ${canShowQR ? `
              <div id="qrCanvas" style="margin:0 auto 12px"></div>
              <div class="qr-url">${qrUrl}</div>
              <button class="dl-btn" id="dlBtn">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Unduh QR Code
              </button>
            ` : `
              <div class="qr-locked">
                <div class="qr-locked-icon">
                  <svg width="24" height="24" fill="none" stroke="#94a3b8" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                </div>
                <div class="qr-locked-title">QR Terkunci</div>
                <div class="qr-locked-sub">Selesaikan kedua langkah konfirmasi untuk membuka QR tiket pengambilan.</div>
                <div class="qr-steps">
                  <div class="qr-step">
                    <div class="qr-step-num">1</div>
                    <div>Kirim pesan ke WhatsApp KuzoSnacks (sudah otomatis dilakukan saat checkout).</div>
                  </div>
                  <div class="qr-step">
                    <div class="qr-step-num">2</div>
                    <div>Konfirmasi di halaman return bahwa kamu sudah kirim pesan WA.</div>
                  </div>
                </div>
              </div>
            `}
          </div>
        </div>
      `;

      if (canShowQR) {
        try {
          setTimeout(() => {
            const canvas = document.getElementById('qrCanvas');
            if (canvas && typeof QRCode !== 'undefined') {
              const qr = new QRCode(canvas, {
                text: qrUrl,
                width: 200,
                height: 200,
                colorDark: '#0f172a',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
              });
              // Download button
              setTimeout(() => {
                const dlBtn = document.getElementById('dlBtn');
                if (dlBtn) {
                  dlBtn.addEventListener('click', () => {
                    try {
                      const img = canvas.querySelector('img') || canvas.querySelector('canvas');
                      const link = document.createElement('a');
                      if (img && img.tagName === 'CANVAS') {
                        link.href = img.toDataURL('image/png');
                      } else if (img) {
                        link.href = img.src;
                      } else {
                        const c = canvas.querySelector('canvas');
                        if (c) link.href = c.toDataURL('image/png');
                      }
                      link.download = `qr-${orderId}.png`;
                      link.click();
                    } catch(e) { alert('Gagal download QR. Coba screenshot saja.'); }
                  });
                }
              }, 500);
            }
          }, 300);
        } catch(e) { console.error('QR error', e); }
      }
    }
  }
} catch(e) { console.error(e); }
</script>
</body>
</html>
