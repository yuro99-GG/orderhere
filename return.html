<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MinBite · Status Pesanan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f5;--bg2:#f2ede6;--card:#fff;--text:#2c2420;--muted:#7a6b5d;--accent:#c8956c;--accent-d:#a67350;--border:#e8e0d5;--shadow:0 4px 24px rgba(44,36,32,.08);--r:20px;--serif:'Playfair Display',Georgia,serif;--sans:'Inter',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
header{background:rgba(250,248,245,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-family:var(--serif);font-size:1.4rem;font-weight:700;text-decoration:none;color:var(--text)}.logo span{color:var(--accent)}
.back-link{font-size:.82rem;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:.35rem;transition:color .15s}
.back-link:hover{color:var(--accent)}
.page-wrap{max-width:540px;margin:0 auto;padding:2rem 1.25rem 4rem}
.page-title{font-family:var(--serif);font-size:1.75rem;margin-bottom:.4rem}
.order-id{font-size:.82rem;color:var(--muted);margin-bottom:1.75rem;font-weight:500}
.not-found{text-align:center;padding:5rem 2rem}
.not-found h2{font-family:var(--serif);font-size:1.5rem;margin-bottom:.75rem}
.not-found p{color:var(--muted);margin-bottom:1.5rem}
.not-found a{color:var(--accent);text-decoration:none;font-weight:600}
/* STATUS BADGE */
.status-badge{display:inline-flex;align-items:center;gap:.45rem;padding:.45rem 1.1rem;border-radius:50px;font-size:.82rem;font-weight:600;letter-spacing:.03em;text-transform:uppercase;margin-bottom:1.75rem}
.s-MENUNGGU{background:#fff3e0;color:#c65000}
.s-DIPROSES{background:#e3f2fd;color:#1255a4}
.s-SIAP{background:#e8f5e9;color:#27742e}
.s-DIBATALKAN{background:#fde8e8;color:#b81c1c}
.pulse{width:8px;height:8px;border-radius:50%;animation:pulse 1.5s ease infinite}
.s-MENUNGGU .pulse{background:#c65000}
.s-DIPROSES .pulse{background:#1255a4}
.s-SIAP .pulse{background:#27742e}
.s-DIBATALKAN .pulse{background:#b81c1c;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
/* CARD */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);padding:1.5rem;margin-bottom:1.25rem}
.card-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:.75rem}
.item-row{display:flex;justify-content:space-between;align-items:center;padding:.55rem 0;border-bottom:1px solid var(--border);font-size:.9rem}
.item-row:last-child{border-bottom:none}
.item-row.total-row{border-top:2px solid var(--border);border-bottom:none;font-weight:700;font-size:1rem;padding-top:.75rem;margin-top:.25rem}
.total-row span:last-child{color:var(--accent)}
/* CUSTOMER INFO */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.info-item label{display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.3rem}
.info-item .val{font-size:.9rem;font-weight:500}
/* QR VISUAL */
.qr-section{text-align:center;padding:1.5rem;background:linear-gradient(135deg,#f9f3ec,var(--bg2));border-radius:var(--r);border:1px solid var(--border);margin-bottom:1.25rem}
.qr-label{font-family:var(--serif);font-size:1.1rem;margin-bottom.5rem;color:var(--text);margin-bottom:.75rem}
.qr-wrapper{display:inline-block;background:#fff;border-radius:12px;padding:14px;box-shadow:var(--shadow);border:1px solid var(--border)}
.qr-hint{margin-top:1rem;font-size:.82rem;color:var(--muted);line-height:1.5}
.qr-hint strong{color:var(--accent)}
/* REFRESH */
.refresh-info{text-align:center;font-size:.75rem;color:var(--muted);margin-top:1.25rem}
/* TOAST */
.toast-container{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:.5rem;align-items:center;pointer-events:none}
.toast{background:var(--text);color:#fff;padding:.7rem 1.4rem;border-radius:50px;font-size:.875rem;font-weight:500;animation:tin .3s ease,tout .3s ease 2.5s forwards;box-shadow:0 4px 16px rgba(44,36,32,.2);white-space:nowrap}
@keyframes tin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateY(14px)}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">Min<span>Bite</span></a>
  <a href="index.html" class="back-link">← Pesan Lagi</a>
</header>

<div class="page-wrap" id="pageContent">
  <div style="text-align:center;padding:3rem 1rem;color:var(--muted)">Memuat pesanan…</div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
function fmtRp(n){return 'Rp\u00a0'+Number(n).toLocaleString('id-ID')}
function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.getElementById('toastContainer').appendChild(t);setTimeout(()=>t.remove(),3100)}

function statusClass(s){
  if(s==='MENUNGGU') return 's-MENUNGGU';
  if(s==='DIPROSES') return 's-DIPROSES';
  if(s==='SIAP DIAMBIL') return 's-SIAP';
  if(s==='DIBATALKAN') return 's-DIBATALKAN';
  return 's-MENUNGGU';
}
function statusLabel(s){
  const map={'MENUNGGU':'⏳ Menunggu','DIPROSES':'⚙️ Diproses','SIAP DIAMBIL':'✅ Siap Diambil','DIBATALKAN':'❌ Dibatalkan'};
  return map[s] || s;
}

const QR_SVG = `<svg viewBox="0 0 120 120" width="120" height="120" xmlns="http://www.w3.org/2000/svg">
  <!-- corner TL -->
  <rect x="5" y="5" width="38" height="38" rx="5" fill="none" stroke="#2c2420" stroke-width="4"/>
  <rect x="13" y="13" width="22" height="22" rx="3" fill="#2c2420"/>
  <!-- corner TR -->
  <rect x="77" y="5" width="38" height="38" rx="5" fill="none" stroke="#2c2420" stroke-width="4"/>
  <rect x="85" y="13" width="22" height="22" rx="3" fill="#2c2420"/>
  <!-- corner BL -->
  <rect x="5" y="77" width="38" height="38" rx="5" fill="none" stroke="#2c2420" stroke-width="4"/>
  <rect x="13" y="85" width="22" height="22" rx="3" fill="#2c2420"/>
  <!-- data modules -->
  <rect x="50" y="5" width="8" height="14" rx="2" fill="#2c2420"/>
  <rect x="62" y="5" width="10" height="8" rx="2" fill="#2c2420"/>
  <rect x="50" y="24" width="14" height="8" rx="2" fill="#2c2420"/>
  <rect x="66" y="18" width="8" height="18" rx="2" fill="#2c2420"/>
  <rect x="5" y="50" width="8" height="16" rx="2" fill="#2c2420"/>
  <rect x="18" y="50" width="18" height="8" rx="2" fill="#2c2420"/>
  <rect x="40" y="50" width="6" height="22" rx="2" fill="#2c2420"/>
  <rect x="50" y="50" width="18" height="8" rx="2" fill="#2c2420"/>
  <rect x="72" y="50" width="8" height="14" rx="2" fill="#2c2420"/>
  <rect x="84" y="50" width="24" height="8" rx="2" fill="#2c2420"/>
  <rect x="100" y="62" width="15" height="8" rx="2" fill="#2c2420"/>
  <rect x="50" y="65" width="14" height="8" rx="2" fill="#2c2420"/>
  <rect x="68" y="65" width="8" height="8" rx="2" fill="#2c2420"/>
  <rect x="50" y="78" width="22" height="8" rx="2" fill="#2c2420"/>
  <rect x="58" y="90" width="8" height="16" rx="2" fill="#2c2420"/>
  <rect x="70" y="85" width="16" height="8" rx="2" fill="#2c2420"/>
  <rect x="90" y="78" width="8" height="22" rx="2" fill="#2c2420"/>
  <rect x="102" y="90" width="13" height="8" rx="2" fill="#2c2420"/>
  <rect x="90" y="104" width="18" height="10" rx="2" fill="#2c2420"/>
</svg>`;

function renderOrder(order) {
  const sc = statusClass(order.status);
  const isReady = order.status === 'SIAP DIAMBIL';
  const isCancelled = order.status === 'DIBATALKAN';
  const d = new Date(order.timestamp);
  const dateStr = d.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}) + ', ' + d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});

  let html = `
    <h1 class="page-title">Status Pesanan</h1>
    <div class="order-id">ID: ${order.id} &nbsp;·&nbsp; ${dateStr}</div>
    <div class="status-badge ${sc}"><span class="pulse"></span>${statusLabel(order.status)}</div>`;

  if (isReady) {
    html += `<div class="qr-section">
      <div class="qr-label">🎉 Pesananmu Siap!</div>
      <div class="qr-wrapper">${QR_SVG}</div>
      <p class="qr-hint">Tunjukkan halaman ini ke penjual saat pengambilan.<br><strong>ID: ${order.id}</strong></p>
    </div>`;
  }

  html += `<div class="card">
    <div class="card-label">Detail Pesanan</div>`;
  order.items.forEach(i => {
    html += `<div class="item-row"><span>${i.name} <span style="color:var(--muted)">× ${i.qty}</span></span><span>${fmtRp(i.price * i.qty)}</span></div>`;
  });
  if (order.discount > 0) {
    html += `<div class="item-row" style="color:#2a7a4b"><span>Diskon (${order.promoCode})</span><span>−${fmtRp(order.discount)}</span></div>`;
  }
  html += `<div class="item-row total-row"><span>Total</span><span>${fmtRp(order.total)}</span></div></div>`;

  html += `<div class="card">
    <div class="card-label">Info Pelanggan</div>
    <div class="info-grid">
      <div class="info-item"><label>Nama</label><div class="val">${order.customer.name}</div></div>
      <div class="info-item"><label>Kelas</label><div class="val">${order.customer.kelas} ${order.customer.jurusan}</div></div>
      <div class="info-item"><label>Waktu Ambil</label><div class="val">${order.customer.pickup}</div></div>
      <div class="info-item"><label>Status</label><div class="val">${statusLabel(order.status)}</div></div>
    </div>
  </div>`;

  if (!isCancelled) {
    html += `<div class="refresh-info" id="refreshInfo">🔄 Status diperbarui otomatis setiap 15 detik</div>`;
  }

  document.getElementById('pageContent').innerHTML = html;
}

function renderNotFound() {
  document.getElementById('pageContent').innerHTML = `
    <div class="not-found">
      <div style="font-size:3rem;margin-bottom:1rem">🔍</div>
      <h2>Pesanan Tidak Ditemukan</h2>
      <p>Pastikan ID pesanan kamu benar.</p>
      <a href="index.html">← Kembali ke Beranda</a>
    </div>`;
}

const params = new URLSearchParams(location.search);
const orderId = params.get('id');

function loadAndRender() {
  if (!orderId) { renderNotFound(); return; }
  const orders = JSON.parse(localStorage.getItem('orders') || '[]');
  const order = orders.find(o => o.id === orderId);
  if (!order) { renderNotFound(); return; }
  renderOrder(order);
}

loadAndRender();
setInterval(loadAndRender, 15000);
</script>
</body>
</html>
